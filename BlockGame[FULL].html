            // Craft output
            const outSlot = document.getElementById('craft-output');
            outSlot.dataset.type = 'output';
            outSlot.dataset.index = 0;
            outSlot.addEventListener('click', takeCraftOutput);

            // Held item follows cursor (global listener, installed once)
            if (!window.__heldItemInstalled) {
                window.__heldItemInstalled = true;
                const heldEl = document.getElementById('held-item');
                const updateHeld = (x, y) => {
                    if (!heldEl) return;
                    heldEl.style.left = x + 'px';
                    heldEl.style.top = y + 'px';
                };
                document.addEventListener('mousemove', e => updateHeld(e.clientX, e.clientY));
                document.addEventListener('touchmove', e => {
                    if (e.touches[0]) updateHeld(e.touches[0].clientX, e.touches[0].clientY);
                }, {passive:true});
                document.addEventListener('pointermove', e => updateHeld(e.clientX, e.clientY));
            }

            updateInventoryUI();
        }

        // ============ HELD ITEM (cursor follower) ============
        let draggedItem = null; // {item: {id,count}}

        function renderHeldItem() {
            const el = document.getElementById('held-item');
            if (!el) return;
            if (!draggedItem) {
                el.classList.remove('active');
                el.innerHTML = '';
                return;
            }
            el.classList.add('active');
            el.innerHTML = `<span style="font-size:24px">${getItemEmoji(draggedItem.item.id)}</span>`;
            if (draggedItem.item.count > 1) {
                const c = document.createElement('div');
                c.className = 'item-count';
                c.textContent = draggedItem.item.count;
                el.appendChild(c);
            }
        }

        function getContainer(type) {
            return type === 'hotbar' ? inventory.hotbar
                 : type === 'main'   ? inventory.main
                 : type === 'craft'  ? inventory.craft
                 : null;
        }

        function attachSlotEvents(slot) {
            // Left click: pick up / drop / swap
            slot.addEventListener('click', (e) => {
                e.preventDefault();
                handleSlotClick(slot, e.shiftKey, false);
            });
            // Right click: split stack in half / place 1 item
            slot.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                handleSlotClick(slot, false, true);
            });
            // Native HTML5 drag support
            slot.setAttribute('draggable', 'true');
            slot.addEventListener('dragstart', (e) => {
                const type = slot.dataset.type;
                const index = parseInt(slot.dataset.index);
                const c = getContainer(type);
                if (c && c[index]) {
                    draggedItem = { item: c[index] };
                    c[index] = null;
                    renderHeldItem();
                    updateInventoryUI();
                    try { e.dataTransfer.setDragImage(new Image(), 0, 0); } catch(_) {}
                } else {
                    e.preventDefault();
                }
            });
            slot.addEventListener('dragover', (e) => {
                e.preventDefault();
                slot.classList.add('drag-over');
            });
            slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
            slot.addEventListener('drop', (e) => {
                e.preventDefault();
                slot.classList.remove('drag-over');
                dropHeldInto(slot, false);
            });
        }

        function handleSlotClick(slot, shiftClick, rightClick) {
            const type = slot.dataset.type;
            const index = parseInt(slot.dataset.index);

            // Craft output - special case
            if (type === 'output') { takeCraftOutput(); return; }

            const container = getContainer(type);
            if (!container) return;

            // Shift+click: fast transfer between hotbar/main
            if (shiftClick && container[index]) {
                const item = container[index];
                const target = type === 'hotbar' ? inventory.main
                              : type === 'main'   ? inventory.hotbar
                              : inventory.main;
                const moved = quickMoveTo(target, item);
                if (moved > 0) {
                    item.count -= moved;
                    if (item.count <= 0) container[index] = null;
                }
                checkCraftingRecipe();
                updateInventoryUI();
                return;
            }

            if (!draggedItem) {
                // Pick up
                if (container[index]) {
                    if (rightClick) {
                        // Right click picks up half (Minecraft style)
                        const src = container[index];
                        const half = Math.ceil(src.count / 2);
                        draggedItem = { item: { id: src.id, count: half } };
                        src.count -= half;
                        if (src.count <= 0) container[index] = null;
                    } else {
                        draggedItem = { item: container[index] };
                        container[index] = null;
                    }
                }
            } else {
                // Drop or swap
                const existing = container[index];
                if (rightClick) {
                    // Right click places one item at a time
                    if (!existing) {
                        container[index] = { id: draggedItem.item.id, count: 1 };
                        draggedItem.item.count--;
                        if (draggedItem.item.count <= 0) draggedItem = null;
                    } else if (existing.id === draggedItem.item.id && existing.count < 64) {
                        existing.count++;
                        draggedItem.item.count--;
                        if (draggedItem.item.count <= 0) draggedItem = null;
                    }
                } else {
                    // Left click: stack/drop/swap
                    if (existing && existing.id === draggedItem.item.id && existing.count < 64) {
                        const canAdd = Math.min(draggedItem.item.count, 64 - existing.count);
                        existing.count += canAdd;
                        draggedItem.item.count -= canAdd;
                        if (draggedItem.item.count <= 0) draggedItem = null;
                    } else {
                        container[index] = draggedItem.item;
                        if (existing) {
                            draggedItem = { item: existing };
                        } else {
                            draggedItem = null;
                        }
                    }
                }
            }

            renderHeldItem();
            checkCraftingRecipe();
            updateInventoryUI();
        }

        function dropHeldInto(slot, rightClick) {
            // Unified drop handler used by native HTML5 drop events
            handleSlotClick(slot, false, rightClick);
        }

        function quickMoveTo(target, item) {
            let movedTotal = 0;
            // First: try to add to existing stacks
            for (let i = 0; i < target.length && item.count > 0; i++) {
                if (target[i] && target[i].id === item.id && target[i].count < 64) {
                    const canAdd = Math.min(item.count, 64 - target[i].count);
                    target[i].count += canAdd;
                    item.count -= canAdd;
                    movedTotal += canAdd;
                }
            }
            // Then: fill empty slots
            for (let i = 0; i < target.length && item.count > 0; i++) {
                if (!target[i]) {
                    const put = Math.min(item.count, 64);
                    target[i] = { id: item.id, count: put };
                    item.count -= put;
                    movedTotal += put;
                }
            }
            return movedTotal;
        }

        function updateInventoryUI() {
            // Hotbar (ana oyun)
            const hotbarEl = document.getElementById('hotbar');
            [...hotbarEl.children].forEach((slot, i) => {
                const item = inventory.hotbar[i];
                renderSlot(slot, item);
                slot.classList.toggle('selected', i === inventory.activeSlot);
            });

            // Menü hotbar
            const hbInv = document.getElementById('hotbar-inventory');
            if (hbInv) [...hbInv.children].forEach((slot, i) => {
                renderSlot(slot, inventory.hotbar[i]);
            });

            // Main
            const mainEl = document.getElementById('main-inventory');
            if (mainEl) [...mainEl.children].forEach((slot, i) => {
                renderSlot(slot, inventory.main[i]);
            });

            // Craft
            const craftEl = document.getElementById('craft-grid');
            if (craftEl) [...craftEl.children].forEach((slot, i) => {
                renderSlot(slot, inventory.craft[i]);
            });

            // Craft output
            const outEl = document.getElementById('craft-output');
            if (outEl) renderSlot(outEl, inventory.craftOutput);
        }

        function renderSlot(slot, item) {
            slot.innerHTML = '';
            slot.classList.toggle('has-item', !!item);
            if (!item) return;
            const emoji = getItemEmoji(item.id);
            slot.innerHTML = `<span style="font-size:22px">${emoji}</span>`;
            if (item.count > 1) {
                const c = document.createElement('div');
                c.className = 'item-count';
                c.textContent = item.count;
                slot.appendChild(c);
            }
        }

        // ============ CRAFTING (3x3 MINECRAFT STYLE) ============
        // Craft grid ids (row-major, 3x3)
        function getCraftGridIds() {
            return inventory.craft.map(s => s ? s.id : null);
        }

        // Extract bounding box of non-null ids in a 3x3 grid
        function getBoundingBox(grid) {
            let minR=3, maxR=-1, minC=3, maxC=-1;
            for (let r=0; r<3; r++) {
                for (let c=0; c<3; c++) {
                    if (grid[r*3+c] != null) {
                        if (r < minR) minR = r;
                        if (r > maxR) maxR = r;
                        if (c < minC) minC = c;
                        if (c > maxC) maxC = c;
                    }
                }
            }
            if (maxR < 0) return null; // empty
            const h = maxR - minR + 1;
            const w = maxC - minC + 1;
            const cells = [];
            for (let r=minR; r<=maxR; r++) {
                for (let c=minC; c<=maxC; c++) {
                    cells.push(grid[r*3+c]);
                }
            }
            return { w, h, cells };
        }

        function checkCraftingRecipe() {
            const grid = getCraftGridIds();
            const box = getBoundingBox(grid);
            if (!box) { inventory.craftOutput = null; return; }

            for (const recipe of RECIPES) {
                if (recipe.shapeless) {
                    // Shapeless: exact list of non-null ingredients must match
                    const items = box.cells.filter(x => x != null).sort();
                    const need = [...recipe.ingredients].sort();
                    if (items.length === need.length && items.every((v,i) => v === need[i])) {
                        inventory.craftOutput = { id: recipe.output[0], count: recipe.output[1] };
                        return;
                    }
                } else {
                    // Shaped: bounding box dimensions and cells must match exactly
                    if (box.w === recipe.w && box.h === recipe.h) {
                        let match = true;
                        for (let i = 0; i < box.cells.length; i++) {
                            if (box.cells[i] !== recipe.pattern[i]) { match = false; break; }
                        }
                        if (match) {
                            inventory.craftOutput = { id: recipe.output[0], count: recipe.output[1] };
                            return;
                        }
                    }
                }
            }
            inventory.craftOutput = null;
        }

        function takeCraftOutput() {
            if (!inventory.craftOutput) return;
            // If held, try to stack
            if (draggedItem) {
                if (draggedItem.item.id === inventory.craftOutput.id && draggedItem.item.count + inventory.craftOutput.count <= 64) {
                    draggedItem.item.count += inventory.craftOutput.count;
                } else {
                    return; // can't take
                }
            } else {
                draggedItem = { item: { id: inventory.craftOutput.id, count: inventory.craftOutput.count } };
            }
            // Reduce inputs by 1 each
            for (let i = 0; i < 9; i++) {
                if (inventory.craft[i]) {
                    inventory.craft[i].count--;
                    if (inventory.craft[i].count <= 0) inventory.craft[i] = null;
                }
            }
            playSound('craft');
            const outName = BLOCKS[inventory.craftOutput.id]?.name || ITEMS[inventory.craftOutput.id]?.name || '?';
            chatMsg('Craft: ' + outName, 'achievement');
            checkCraftingRecipe();
            renderHeldItem();
            updateInventoryUI();
        }

        // ============ CREATIVE PALETTE ============
        function buildCreativePalette() {
            const el = document.getElementById('creative-palette');
            el.innerHTML = '';
            Object.keys(BLOCKS).forEach(id => {
                id = parseInt(id);
                if (id === 0 || id === 8 || id === 9) return; // havayı, portalı, bedrock'ı atla
                const slot = document.createElement('div');
                slot.className = 'inv-slot has-item';
                slot.innerHTML = `<span style="font-size:20px">${getItemEmoji(id)}</span>`;
                slot.title = BLOCKS[id].name;
                slot.addEventListener('click', () => {
                    if (gameMode === 'creative') {
                        addToInventory(id, 64);
                        chatMsg(`+64 ${BLOCKS[id].name}`, 'achievement');
                    }
                });
                el.appendChild(slot);
            });
            // Items
            Object.keys(ITEMS).forEach(id => {
                id = parseInt(id);
                const slot = document.createElement('div');
                slot.className = 'inv-slot has-item';
                slot.innerHTML = `<span style="font-size:20px">${getItemEmoji(id)}</span>`;
                slot.title = ITEMS[id].name;
                slot.addEventListener('click', () => {
                    if (gameMode === 'creative') {
                        addToInventory(id, 1);
                        chatMsg(`+1 ${ITEMS[id].name}`, 'achievement');
                    }
                });
                el.appendChild(slot);
            });
        }

        // ============ BLOCK GENERATION ============
        function setRawBlock(data, x, y, z, type) {
            if (x >= 0 && x < CHUNK_X && y >= 0 && y < CHUNK_Y && z >= 0 && z < CHUNK_Z) {
                data[x + y * CHUNK_X + z * CHUNK_X * CHUNK_Y] = type;
            }
        }

        function getBiome(wx, wz) {
            const n = Math.sin(wx * 0.02) * Math.cos(wz * 0.02);
            const h = Math.sin(wx * 0.05 + 100) + Math.cos(wz * 0.05 + 50);
            if (h > 1.5) return 'mountain';
            if (n > 0.5) return 'desert';
            if (n < -0.4) return 'snow';
            if (n > 0.1 && n < 0.3) return 'forest';
            return 'plains';
        }

        function spawnTree(data, tx, ty, tz, type) {
            let trunk = 4, leaves = 5;
            if (type === 'nether') { trunk = 6; leaves = 7; }
            else if (type === 'heaven') { trunk = 7; leaves = 8; }

            for (let i = 0; i < 4; i++) setRawBlock(data, tx, ty + i, tz, trunk);
            for (let x = -2; x <= 2; x++) {
                for (let z = -2; z <= 2; z++) {
                    if (Math.abs(x) === 2 && Math.abs(z) === 2) continue;
                    setRawBlock(data, tx + x, ty + 3, tz + z, leaves);
                    setRawBlock(data, tx + x, ty + 4, tz + z, leaves);
                }
            }
            setRawBlock(data, tx, ty + 5, tz, leaves);
        }

        function generateChunk(cx, cy, cz) {
            const key = `${cx},${cy},${cz}`;
            if (chunks[key]) return;

            const data = new Int8Array(CHUNK_X * CHUNK_Y * CHUNK_Z);

            for (let x = 0; x < CHUNK_X; x++) {
                for (let z = 0; z < CHUNK_Z; z++) {
                    const worldX = cx * CHUNK_X + x;
                    const worldZ = cz * CHUNK_Z + z;
                    const biome = getBiome(worldX, worldZ);

                    let h;
                    if (worldType === 'flat') h = 30;
                    else {
                        h = Math.floor(Math.sin(worldX / 12) * 4 + Math.cos(worldZ / 12) * 3) + 30;
                        if (biome === 'mountain') h += Math.floor(Math.sin(worldX*0.08) * Math.cos(worldZ*0.08) * 8) + 5;
                        if (biome === 'desert') h -= 1;
                    }

                    for (let y = 0; y < CHUNK_Y; y++) {
                        const absY = cy * CHUNK_Y + y;

                        if (currentDimension === 'nether') {
                            if (absY === h) {
                                setRawBlock(data, x, y, z, 33); // netherrack
                                if (worldType === 'normal' && Math.random() < 0.02) {
                                    spawnTree(data, x, y + 1, z, 'nether');
                                }
                            } else if (absY < h && absY > h - 3) setRawBlock(data, x, y, z, 33);
                            else if (absY <= h - 3) {
                                if (Math.random() < 0.03) setRawBlock(data, x, y, z, 34); // ruh kumu
                                else setRawBlock(data, x, y, z, 6); // obsidian
                            }
                            // Lav gölleri
                            if (absY === h - 1 && Math.random() < 0.005) setRawBlock(data, x, y, z, 14);
                        }
                        else if (currentDimension === 'heaven') {
                            const heavenH = worldType === 'flat' ? 35 : h + 5;
                            if (absY === heavenH) {
                                setRawBlock(data, x, y, z, 7);
                                if (worldType === 'normal' && Math.random() < 0.02) {
                                    spawnTree(data, x, y + 1, z, 'heaven');
                                }
                            } else if (absY < heavenH && absY > heavenH - 3) setRawBlock(data, x, y, z, 1);
                        }
                        else if (currentDimension === 'immortality') {
                            if (absY === 30 && worldX >= 6 && worldX <= 10) setRawBlock(data, x, y, z, 9);
                        }
                        else {
                            // OVERWORLD
                            if (absY === 0) setRawBlock(data, x, y, z, 9); // bedrock
                            else if (absY === h) {
                                if (biome === 'desert') setRawBlock(data, x, y, z, 11);
                                else if (biome === 'snow') setRawBlock(data, x, y, z, 28);
                                else setRawBlock(data, x, y, z, 1);

                                // Yüzey dekorasyon
                                if (worldType === 'normal' && Math.random() < 0.04) {
                                    if (biome === 'forest' || biome === 'plains') {
                                        if (Math.random() < 0.6) spawnTree(data, x, y + 1, z, 'overworld');
                                        else if (Math.random() < 0.5) setRawBlock(data, x, y + 1, z, 27);
                                        else setRawBlock(data, x, y + 1, z, 30);
                                    } else if (biome === 'desert' && Math.random() < 0.2) {
                                        setRawBlock(data, x, y + 1, z, 26);
                                        setRawBlock(data, x, y + 2, z, 26);
                                    }
                                }
                            }
                            else if (absY < h && absY > h - 4) {
                                if (biome === 'desert') setRawBlock(data, x, y, z, 11);
                                else setRawBlock(data, x, y, z, 2);
                            }
                            else if (absY <= h - 4) {
                                // Ore generation
                                const r = Math.random();
                                if (absY < 12 && r < 0.008) setRawBlock(data, x, y, z, 22); // elmas
                                else if (absY < 20 && r < 0.015) setRawBlock(data, x, y, z, 20); // altın
                                else if (absY < 30 && r < 0.04) setRawBlock(data, x, y, z, 18); // demir
                                else if (r < 0.06) setRawBlock(data, x, y, z, 16); // kömür
                                else setRawBlock(data, x, y, z, 3);
                            }

                            // (Su sistemi kaldırıldı)
                        }
                    }
                }
            }

            chunks[key] = data;
            renderChunk(cx, cy, cz);
            // Yeni chunk yükleninde, komşu chunk'ların sınır yüzleri değişmiş olabilir:
            // onları dirty olarak işaretle ki face-culling doğru çalışsın.
            const nb1 = `${cx-1},${cy},${cz}`; if (chunks[nb1]) dirtyChunks.add(nb1);
            const nb2 = `${cx+1},${cy},${cz}`; if (chunks[nb2]) dirtyChunks.add(nb2);
            const nb3 = `${cx},${cy},${cz-1}`; if (chunks[nb3]) dirtyChunks.add(nb3);
            const nb4 = `${cx},${cy},${cz+1}`; if (chunks[nb4]) dirtyChunks.add(nb4);
            flatMeshCacheDirty = true;
        }

        // Bir blokun 6 komşusundan en az biri opak değilse görünürdür.
        // Aynı chunk içindeyse hızlı indeks ile, değilse getBlock ile komşu tipi alınır.
        function _neighborType(data, cx, cy, cz, lx, ly, lz) {
            if (lx >= 0 && lx < CHUNK_X && ly >= 0 && ly < CHUNK_Y && lz >= 0 && lz < CHUNK_Z) {
                return data[lx + ly * CHUNK_X + lz * CHUNK_X * CHUNK_Y];
            }
            // Chunk dışında — global koordinatla bak
            return getBlock(cx * CHUNK_X + lx, cy * CHUNK_Y + ly, cz * CHUNK_Z + lz);
        }

        function renderChunk(cx, cy, cz) {
            const key = `${cx},${cy},${cz}`;
            // Eski meshleri temizle (geometri paylaşımlı, sadece instancedMesh.dispose)
            if (chunkMeshes[key]) {
                const old = chunkMeshes[key];
                for (let i = 0; i < old.length; i++) {
                    scene.remove(old[i]);
                    old[i].dispose && old[i].dispose();
                }
            }
            chunkMeshes[key] = [];
            const data = chunks[key];
            if (!data) return;

            if (!SHARED_BOX_GEO) SHARED_BOX_GEO = new THREE.BoxGeometry(1, 1, 1);
            const geo = SHARED_BOX_GEO;

            // --- FACE CULLING: gizli blokları atla ---
            // Bir blok, 6 komşusundan en az biri "şeffaf veya hava" ise görünür kabul edilir.
            // Tam kaplı bölgelerde gizli blokları render etmekten kaçınırız (performans büyük kazanç).
            const typeGroups = {};
            const len = data.length;
            for (let i = 0; i < len; i++) {
                const t = data[i];
                if (t === 0) continue;
                const lx = i % CHUNK_X;
                const ly = (i / CHUNK_X | 0) % CHUNK_Y;
                const lz = (i / (CHUNK_X * CHUNK_Y)) | 0;

                // Kendisi şeffaf/foliage ise her zaman göster (pek az olur, su/yaprak vb.)
                const selfFlags = BLOCKS[t] && BLOCKS[t].flags;
                let visible = (selfFlags && (selfFlags.t || selfFlags.f || selfFlags.l));

                if (!visible) {
                    // 6 komşuyu kontrol et
                    const n1 = _neighborType(data, cx, cy, cz, lx + 1, ly, lz);
                    const n2 = _neighborType(data, cx, cy, cz, lx - 1, ly, lz);
                    const n3 = _neighborType(data, cx, cy, cz, lx, ly + 1, lz);
                    const n4 = _neighborType(data, cx, cy, cz, lx, ly - 1, lz);
                    const n5 = _neighborType(data, cx, cy, cz, lx, ly, lz + 1);
                    const n6 = _neighborType(data, cx, cy, cz, lx, ly, lz - 1);
                    // Herhangi biri şeffafsa/hava ise => görünür yüz var
                    if (_isTransparentNeighbor(n1) || _isTransparentNeighbor(n2) ||
                        _isTransparentNeighbor(n3) || _isTransparentNeighbor(n4) ||
                        _isTransparentNeighbor(n5) || _isTransparentNeighbor(n6)) {
                        visible = true;
                    }
                }
                if (!visible) continue;

                if (!typeGroups[t]) typeGroups[t] = [];
                typeGroups[t].push(i);
            }

            const dummy = _tmpDummy || (_tmpDummy = new THREE.Object3D());
            const keys = Object.keys(typeGroups);
            for (let k = 0; k < keys.length; k++) {
                const type = +keys[k];
                const positions = typeGroups[type];
                const count = positions.length;
                if (count === 0) continue;

                const material = getBlockMaterial(type);
                const mesh = new THREE.InstancedMesh(geo, material, count);
                mesh.frustumCulled = true;

                for (let i = 0; i < count; i++) {
                    const idx = positions[i];
                    const lx = idx % CHUNK_X;
                    const ly = (idx / CHUNK_X | 0) % CHUNK_Y;
                    const lz = (idx / (CHUNK_X * CHUNK_Y)) | 0;
                    dummy.position.set(
                        lx + cx * CHUNK_X + 0.5,
                        ly + cy * CHUNK_Y + 0.5,
                        lz + cz * CHUNK_Z + 0.5
                    );
                    dummy.updateMatrix();
                    mesh.setMatrixAt(i, dummy.matrix);
                }
                mesh.instanceMatrix.needsUpdate = true;
                mesh.userData.blockType = type;
                mesh.userData.chunkKey = key;
                scene.add(mesh);
                chunkMeshes[key].push(mesh);
            }

            flatMeshCacheDirty = true;
        }

        // Bir blok tipi yüzeyi "görünür kılacak" tipte mi? (hava veya şeffaf/foliage/sıvı)
        function _isTransparentNeighbor(t) {
            if (t === 0) return true;
            const f = BLOCKS[t] && BLOCKS[t].flags;
            return !!(f && (f.t || f.f || f.l));
        }

        function getFlatMeshes() {
            if (flatMeshCacheDirty || !flatMeshCache) {
                flatMeshCache = [];
                for (const k in chunkMeshes) {
                    const arr = chunkMeshes[k];
                    for (let i = 0; i < arr.length; i++) flatMeshCache.push(arr[i]);
                }
                flatMeshCacheDirty = false;
            }
            return flatMeshCache;
        }

        // Raycaster için sadece oyuncuya yakın chunk'ların meshlerini döner (7 birim menzil yeterli)
        function getNearbyMeshes() {
            const px = Math.floor(player.pos.x / CHUNK_X);
            const pz = Math.floor(player.pos.z / CHUNK_Z);
            const out = [];
            // Sadece bulunulan + 1 komşu chunk'ı tara (raycaster.far=7 zaten küçük)
            for (let dx = -1; dx <= 1; dx++) {
                for (let dz = -1; dz <= 1; dz++) {
                    const k = `${px + dx},0,${pz + dz}`;
                    const arr = chunkMeshes[k];
                    if (arr) for (let i = 0; i < arr.length; i++) out.push(arr[i]);
                }
            }
            return out;
        }

        function getBlock(x, y, z) {
            const cx = Math.floor(x / CHUNK_X);
            const cy = Math.floor(y / CHUNK_Y);
            const cz = Math.floor(z / CHUNK_Z);
            const key = `${cx},${cy},${cz}`;
            if (!chunks[key]) return 0;
            const lx = ((Math.floor(x) % CHUNK_X) + CHUNK_X) % CHUNK_X;
            const ly = ((Math.floor(y) % CHUNK_Y) + CHUNK_Y) % CHUNK_Y;
            const lz = ((Math.floor(z) % CHUNK_Z) + CHUNK_Z) % CHUNK_Z;
            return chunks[key][lx + ly * CHUNK_X + lz * CHUNK_X * CHUNK_Y];
        }

        function setBlock(x, y, z, type) {
            const cx = Math.floor(x / CHUNK_X);
            const cy = Math.floor(y / CHUNK_Y);
            const cz = Math.floor(z / CHUNK_Z);
            const key = `${cx},${cy},${cz}`;
            if (!chunks[key]) return;
            const lx = ((Math.floor(x) % CHUNK_X) + CHUNK_X) % CHUNK_X;
            const ly = ((Math.floor(y) % CHUNK_Y) + CHUNK_Y) % CHUNK_Y;
            const lz = ((Math.floor(z) % CHUNK_Z) + CHUNK_Z) % CHUNK_Z;
            chunks[key][lx + ly * CHUNK_X + lz * CHUNK_X * CHUNK_Y] = type;
            // Sadece işaretle — bir sonraki frame'de toplu re-mesh (performans).
            dirtyChunks.add(key);
            // Chunk sınırında ise komşu chunk da etkilenir (face culling için)
            if (lx === 0)           dirtyChunks.add(`${cx-1},${cy},${cz}`);
            if (lx === CHUNK_X - 1) dirtyChunks.add(`${cx+1},${cy},${cz}`);
            if (lz === 0)           dirtyChunks.add(`${cx},${cy},${cz-1}`);
            if (lz === CHUNK_Z - 1) dirtyChunks.add(`${cx},${cy},${cz+1}`);
            flatMeshCacheDirty = true;
        }

        // Kirli chunk kuyruğunu frame başına sınırlı sayıda işler
        function processDirtyChunks(budget = 2) {
            if (dirtyChunks.size === 0) return;
            let processed = 0;
            for (const k of dirtyChunks) {
                if (processed >= budget) break;
                const [cx, cy, cz] = k.split(',').map(Number);
                if (chunks[k]) renderChunk(cx, cy, cz);
                dirtyChunks.delete(k);
                processed++;
            }
        }

        // ============ ACTION (KIR/KOY) ============
        function performAction(build) {
            initAudio();
            raycaster.setFromCamera(_tmpVec1, camera);
            const intersections = raycaster.intersectObjects(getNearbyMeshes(), false);
            if (intersections.length === 0) return;

            const hit = intersections[0];
            const hp = hit.point, hn = hit.face.normal;

            if (build) {
                const activeBlock = getActiveBlock();
                if (activeBlock === 0) {
                    chatMsg('Seçili blok yok!', 'error');
                    return;
                }
                const bx = Math.floor(hp.x + hn.x * 0.5);
                const by = Math.floor(hp.y + hn.y * 0.5);
                const bz = Math.floor(hp.z + hn.z * 0.5);

                // Oyuncuya çarpışma kontrolü (clone'suz)
                const pfx = Math.floor(player.pos.x);
                const pfz = Math.floor(player.pos.z);
                const pfy = Math.floor(player.pos.y);
                const pfyFoot = Math.floor(player.pos.y - player.height);
                if (pfx === bx && pfz === bz && (by === pfy || by === pfyFoot)) return;

                setBlock(bx, by, bz, activeBlock);
                playSound('place');
                if (gameMode === 'survival') removeFromActiveSlot(1);
            } else {
                // KIR
                const bx = Math.floor(hp.x - hn.x * 0.5);
                const by = Math.floor(hp.y - hn.y * 0.5);
                const bz = Math.floor(hp.z - hn.z * 0.5);
                const blockType = getBlock(bx, by, bz);
                if (blockType === 0 || blockType === 9) return;

                const block = BLOCKS[blockType];
                if (block.hard > 10 && gameMode !== 'creative') {
                    chatMsg('Bu blok çok sert!', 'error');
                    return;
                }

                setBlock(bx, by, bz, 0);
                const soundType = block.flags?.sound || 'stone';
                playSound('break_' + soundType, 0.6);

                // Drop
                if (gameMode === 'survival' && block.drop) {
                    spawnItemDrop(bx + 0.5, by + 0.5, bz + 0.5, block.drop);
                    gainXP(1);
                } else if (gameMode === 'creative') {
                    // creative: hiçbir şey
                }
            }
        }

        // Paylaşılan dropped-item geometrisi
        let _DROP_GEO = null;
        function spawnItemDrop(x, y, z, blockId) {
            if (!_DROP_GEO) _DROP_GEO = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            const mat = getBlockMaterial(blockId);
            const mesh = new THREE.Mesh(_DROP_GEO, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            droppedItems.push({
                mesh, blockId,
                vel: new THREE.Vector3((Math.random()-0.5)*0.1, 0.15, (Math.random()-0.5)*0.1),
                age: 0
            });
        }

        function updateDroppedItems() {
            for (let i = droppedItems.length - 1; i >= 0; i--) {
                const d = droppedItems[i];
                d.age++;
                d.vel.y -= 0.01;

                // Çarpışma - altındaki blok solidse dur
                const below = getBlock(d.mesh.position.x, d.mesh.position.y - 0.15 + d.vel.y, d.mesh.position.z);
                if (below > 0 && below !== 8 && below !== 13 && below !== 14) {
                    d.vel.y = 0;
                    d.vel.x *= 0.85;
                    d.vel.z *= 0.85;
                }
                d.mesh.position.add(d.vel);
                d.mesh.rotation.y += 0.03;
                d.mesh.position.y += Math.sin(d.age * 0.08) * 0.005;

                // Oyuncu yakınsa topla
                const dist = d.mesh.position.distanceTo(player.pos);
                if (dist < 2 && d.age > 10) {
                    addToInventory(d.blockId, 1);
                    playSound('pickup', 0.5);
                    chatMsg(`+1 ${BLOCKS[d.blockId]?.name || ITEMS[d.blockId]?.name}`, 'system');
                    scene.remove(d.mesh);
                    droppedItems.splice(i, 1);
                }
                // Çok eskiyse yok et
                if (d.age > 6000) {
                    scene.remove(d.mesh);
                    droppedItems.splice(i, 1);
                }
            }
        }

        // ============ XP / HEALTH ============
        function gainXP(amount) {
            player.xp += amount;
            const needed = (player.xpLevel + 1) * 10;
            if (player.xp >= needed) {
                player.xp = 0;
                player.xpLevel++;
                playSound('level_up');
                chatMsg(`Level ${player.xpLevel}!`, 'achievement');
            }
            updateHUD();
        }

        function damagePlayer(amount, reason='') {
            if (gameMode === 'creative') return;
            player.health = Math.max(0, player.health - amount);
            player.hurtTime = 20;
            playSound('hurt');
            const overlay = document.getElementById('damage-overlay');
            overlay.style.opacity = '0.8';
            setTimeout(() => overlay.style.opacity = '0', 300);
            if (player.health <= 0) {
                playerDeath(reason);
            }
            updateHUD();
        }

        function playerDeath(reason) {
            document.getElementById('death-screen').classList.add('visible');
            if (reason) chatMsg('Öldün: ' + reason, 'error');
        }

        function respawn() {
            player.pos.set(8, 45, 8);
            player.vel.set(0, 0, 0);
            player.health = 20;
            player.hunger = 20;
            switchDimension('overworld');
            document.getElementById('death-screen').classList.remove('visible');
            chatMsg('Yeniden doğdun', 'system');
        }

        function eatFood(foodValue) {
            player.hunger = Math.min(player.maxHunger, player.hunger + foodValue);
            player.saturation = Math.min(20, player.saturation + foodValue/2);
            playSound('eat');
            updateHUD();
        }

        // ============ HUD ============
        function updateHUD() {
            const healthBar = document.getElementById('health-bar');
            const hungerBar = document.getElementById('hunger-bar');

            if (gameMode === 'creative') {
                healthBar.style.display = 'none';
                hungerBar.style.display = 'none';
            } else {
                healthBar.style.display = '';
                hungerBar.style.display = '';

                // Heart display (10 heart = 20 health)
                healthBar.innerHTML = '';
                for (let i = 0; i < 10; i++) {
                    const hp = player.health - i*2;
                    const cls = hp >= 2 ? '' : (hp >= 1 ? 'half' : 'empty');
                    healthBar.innerHTML += `<span class="heart ${cls}">❤</span>`;
                }

                // Hunger display
                hungerBar.innerHTML = '';
                for (let i = 0; i < 10; i++) {
                    const h = player.hunger - i*2;
                    const cls = h >= 2 ? '' : (h >= 1 ? 'half' : 'empty');
                    hungerBar.innerHTML += `<span class="hunger ${cls}">🍗</span>`;
                }
            }

            // XP bar
            const needed = (player.xpLevel + 1) * 10;
            document.getElementById('xp-fill').style.width = (player.xp / needed * 100) + '%';
            document.getElementById('xp-level').textContent = player.xpLevel;
        }

        // ============ TIME / DAY-NIGHT ============
        // Reusable renk objeleri (GC baskısı azaltır)
        const _DN = {
            night:   null, dawn: null, day: null, dusk: null,
            bg:      null
        };
        function _ensureDNColors() {
            if (_DN.bg) return;
            _DN.night = new THREE.Color(0x0a0a2a);
            _DN.dawn  = new THREE.Color(0xffa07a);
            _DN.day   = new THREE.Color(0x87ceeb);
            _DN.dusk  = new THREE.Color(0xff6347);
            _DN.bg    = new THREE.Color(0x87ceeb);
        }
        function updateDayNight() {
            worldTime += 0.5; // 1 tik = 0.5 saniye-game, ~13dk bir gün
            if (worldTime >= 24000) worldTime = 0;

            if (currentDimension !== 'overworld') return;
            _ensureDNColors();

            const t = worldTime;
            let lightIntensity, ambIntensity;

            if (t < 6000) { // gece -> şafak
                const f = t / 6000;
                lightIntensity = f * 0.6;
                ambIntensity = 0.2 + f * 0.5;
                _DN.bg.copy(_DN.night).lerp(_DN.dawn, f);
            } else if (t < 12000) { // gündüz
                lightIntensity = 0.6;
                ambIntensity = 0.7;
                _DN.bg.copy(_DN.day);
            } else if (t < 18000) { // gündüz -> gün batımı
                const f = (t - 12000) / 6000;
                lightIntensity = 0.6 - f * 0.55;
                ambIntensity = 0.7 - f * 0.5;
                _DN.bg.copy(_DN.day).lerp(_DN.dusk, f);
            } else { // gün batımı -> gece
                const f = (t - 18000) / 6000;
                lightIntensity = 0.05;
                ambIntensity = 0.2;
                _DN.bg.copy(_DN.dusk).lerp(_DN.night, f);
            }

            sunLight.intensity = lightIntensity;
            ambientLight.intensity = ambIntensity;
            scene.background.copy(_DN.bg);
            scene.fog.color.copy(_DN.bg);

            // HUD time (saniyede bir yeterli)
            if (tickCounter % 20 === 0) {
                const hours = Math.floor((t / 1000 + 6) % 24);
                const minutes = Math.floor(((t / 1000 + 6) % 1) * 60);
                const timeStr = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}`;
                const icon = (t < 6000 || t > 18000) ? '🌙' : '🌞';
                const tEl = document.getElementById('time-stats');
                if (tEl) tEl.textContent = `${icon} ${timeStr}`;
            }
        }

        // ============ SAVE / LOAD ============
        function saveWorld() {
            try {
                const save = {
                    player: {
                        pos: [player.pos.x, player.pos.y, player.pos.z],
                        health: player.health,
                        hunger: player.hunger,
                        xp: player.xp,
                        xpLevel: player.xpLevel
                    },
                    inventory: {
                        hotbar: inventory.hotbar,
                        main: inventory.main,
                        activeSlot: inventory.activeSlot
                    },
                    currentDimension,
                    worldTime,
                    gameMode,
                    worldType,
                    chunks: {}
                };

                // Tüm dimension chunk'larını kaydet
                Object.keys(dimensions).forEach(dim => {
                    save.chunks[dim] = {};
                    Object.keys(dimensions[dim].chunks).forEach(key => {
                        save.chunks[dim][key] = Array.from(dimensions[dim].chunks[key]);
                    });
                });

                localStorage.setItem('voxelSave', JSON.stringify(save));
                chatMsg('💾 Dünya kaydedildi!', 'achievement');
            } catch(e) {
                chatMsg('Kayıt hatası: ' + e.message, 'error');
            }
        }

        function loadWorld() {
            try {
                const raw = localStorage.getItem('voxelSave');
                if (!raw) return;
                const save = JSON.parse(raw);

                if (save.player) {
                    player.pos.set(...save.player.pos);
                    player.health = save.player.health || 20;
                    player.hunger = save.player.hunger || 20;
                    player.xp = save.player.xp || 0;
                    player.xpLevel = save.player.xpLevel || 0;
                }
                if (save.inventory) {
                    inventory.hotbar = save.inventory.hotbar || new Array(9).fill(null);
                    inventory.main = save.inventory.main || new Array(27).fill(null);
                    inventory.activeSlot = save.inventory.activeSlot || 0;
                }
                if (save.gameMode) {
                    gameMode = save.gameMode;
                    document.getElementById('ui').classList.toggle('creative-mode', gameMode === 'creative');
                    document.querySelectorAll('.mode-btn').forEach(b => {
                        b.classList.toggle('active', b.dataset.mode === gameMode);
                    });
                }
                if (save.worldType) worldType = save.worldType;
                if (save.worldTime != null) worldTime = save.worldTime;

                // Chunks restore
                if (save.chunks) {
                    Object.keys(save.chunks).forEach(dim => {
                        dimensions[dim].chunks = {};
                        Object.keys(save.chunks[dim]).forEach(key => {
                            dimensions[dim].chunks[key] = new Int8Array(save.chunks[dim][key]);
                        });
                    });
                }

                if (save.currentDimension) {
                    currentDimension = save.currentDimension;
                    bindCurrentDimensionRefs();
                    switchDimension(currentDimension, true);
                }

                chatMsg('📂 Kayıtlı dünya yüklendi', 'system');
            } catch(e) {
                console.error('Load error:', e);
            }
        }

        // ============ DIMENSIONS ============
        function switchDimension(targetDim, force = false) {
            const prevDimension = currentDimension;
            if (!force && prevDimension === targetDim) return;

            Object.values(chunkMeshes).flat().forEach(m => scene.remove(m));

            currentDimension = targetDim;
            bindCurrentDimensionRefs();
            resetMonsterState();

            scene.fog.near = 20;
            scene.fog.far = 60;

            if (targetDim === 'nether') {
                scene.background.set(0x220000);
                scene.fog.color.set(0x220000);
                ambientLight.color.setHex(0xffaaaa);
                ambientLight.intensity = 0.6;
                sunLight.intensity = 0.05;
                if (prevDimension === 'overworld') {
                    player.pos.set(player.pos.x / 8, 45, player.pos.z / 8);
                }
                document.getElementById('dim-stats').innerText = 'Nether 🔥';
                document.getElementById('dim-stats').style.color = '#ff5555';
            } else if (targetDim === 'heaven') {
                scene.background.set(0xffffee);
                scene.fog.color.set(0xffffee);
                ambientLight.color.setHex(0xffffff);
                ambientLight.intensity = 1.0;
                sunLight.intensity = 0.8;
                player.pos.set(player.pos.x, 50, player.pos.z);
                document.getElementById('dim-stats').innerText = 'Cennet ☁️';
                document.getElementById('dim-stats').style.color = '#dddd00';
            } else if (targetDim === 'immortality') {
                scene.background.set(0x0a0000);
                scene.fog.color.set(0x880000);
                scene.fog.near = 2;
                scene.fog.far = 25;
                ambientLight.color.setHex(0xff5555);
                ambientLight.intensity = 0.4;
                sunLight.intensity = 0.0;
                player.pos.set(8, 35, 8);
                document.getElementById('dim-stats').innerText = 'Immortality 🩸';
                document.getElementById('dim-stats').style.color = '#aa0000';
                monsterState.active = true;
                monsterState.jumpscare = false;
                monsterState.startZ = player.pos.z;
                monsterMesh.scale.set(1, 1, 1);
            } else {
                scene.background.set(0x87ceeb);
                scene.fog.color.set(0x87ceeb);
                ambientLight.color.setHex(0xffffff);
                ambientLight.intensity = 0.7;
                sunLight.intensity = 0.6;
                if (prevDimension === 'nether') {
                    player.pos.set(player.pos.x * 8, 45, player.pos.z * 8);
                }
                document.getElementById('dim-stats').innerText = 'Overworld 🌍';
                document.getElementById('dim-stats').style.color = '#55ff55';
            }

            Object.values(chunkMeshes).flat().forEach(m => scene.add(m));
            player.vel.set(0, 0, 0);
            player.onGround = false;
            portalCooldown = 150;
            flatMeshCacheDirty = true;
            playSound('portal');
        }

        // ============ COMMANDS ============
        function processCommand(cmd) {
            const raw = cmd.trim();
            if (!raw) return;
            const parts = raw.split(/\s+/);
            const type = parts[0].toLowerCase();

            if (type === '/nether') switchDimension('nether');
            else if (type === '/heaven') switchDimension('heaven');
            else if (type === '/immortality') switchDimension('immortality');
            else if (type === '/overworld' || type === '/world') {
                if (parts[1] === 'flat' || parts[1] === 'normal') {
                    worldType = parts[1];
                    Object.values(dimensions).forEach(dim => {
                        Object.values(dim.meshes).flat().forEach(m => scene.remove(m));
                    });
                    dimensions = createEmptyDimensions();
                    currentDimension = 'overworld';
                    bindCurrentDimensionRefs();
                    player.pos.set(8, 45, 8);
                    player.vel.set(0, 0, 0);
                    switchDimension('overworld', true);
                } else switchDimension('overworld');
            }
            else if (type === '/give') {
                // /give 3 64
                const id = parseInt(parts[1]);
                const count = parseInt(parts[2]) || 1;
                if (BLOCKS[id] || ITEMS[id]) {
                    addToInventory(id, count);
                    chatMsg(`+${count} ${BLOCKS[id]?.name || ITEMS[id]?.name}`, 'achievement');
                } else chatMsg('Bilinmeyen blok/eşya: ' + id, 'error');
            }
            else if (type === '/time') {
                if (parts[1] === 'day') worldTime = 6000;
                else if (parts[1] === 'night') worldTime = 18000;
                else if (parts[1] === 'set') worldTime = parseInt(parts[2]) || 6000;
                chatMsg(`Zaman: ${worldTime}`, 'system');
            }
            else if (type === '/heal') {
                player.health = player.maxHealth;
                player.hunger = player.maxHunger;
                updateHUD();
                chatMsg('Yenilendin!', 'achievement');
            }
            else if (type === '/kill') {
                damagePlayer(100, 'komut');
            }
            else if (type === '/creative') {
                gameMode = 'creative';
                document.getElementById('ui').classList.add('creative-mode');
                document.querySelectorAll('.mode-btn').forEach(b =>
                    b.classList.toggle('active', b.dataset.mode === 'creative'));
                updateHUD();
            }
            else if (type === '/survival') {
                gameMode = 'survival';
                document.getElementById('ui').classList.remove('creative-mode');
                document.querySelectorAll('.mode-btn').forEach(b =>
                    b.classList.toggle('active', b.dataset.mode === 'survival'));
                updateHUD();
            }
            else if (type === '/tp') {
                player.pos.set(parseFloat(parts[1])||0, parseFloat(parts[2])||50, parseFloat(parts[3])||0);
            }
            else if (type === '/clearinv') {
                inventory.hotbar = new Array(9).fill(null);
                inventory.main = new Array(27).fill(null);
                updateInventoryUI();
            }
            else if (type === '/save') saveWorld();
            else if (type === '/load') loadWorld();
            else if (type === '/help') {
                chatMsg('/nether /heaven /immortality /overworld /give <id> <count>', 'system');
                chatMsg('/time <day|night|set N> /heal /creative /survival', 'system');
                chatMsg('/tp x y z /clearinv /save /load', 'system');
            }
            else chatMsg('Bilinmeyen komut: ' + type, 'error');
        }

        // ============ UI EVENTS ============
        function toggleSettingsMenu(force) {
            const menu = document.getElementById('settings-menu');
            const ui = document.getElementById('ui');
            const shouldOpen = force !== undefined ? force : menu.style.display !== 'block';
            menu.style.display = shouldOpen ? 'block' : 'none';
            ui.classList.toggle('settings-open', shouldOpen);
            if (shouldOpen) closeInventoryUI();
            resetTouchState();
        }

        function toggleInventoryMenu(force) {
            const menu = document.getElementById('inventory-menu');
            const ui = document.getElementById('ui');
            const shouldOpen = force !== undefined ? force : menu.style.display !== 'block';
            menu.style.display = shouldOpen ? 'block' : 'none';
            ui.classList.toggle('inventory-open', shouldOpen);
            if (shouldOpen) {
                toggleSettingsMenu(false);
                updateInventoryUI();
            } else {
                // Craft'taki eşyaları envantere geri koy
                inventory.craft.forEach((item, i) => {
                    if (item) {
                        addToInventory(item.id, item.count);
                        inventory.craft[i] = null;
                    }
                });
                inventory.craftOutput = null;
                if (draggedItem) {
                    addToInventory(draggedItem.item.id, draggedItem.item.count);
                    draggedItem = null;
                    renderHeldItem();
                }
            }
            resetTouchState();
        }

        function closeInventoryUI() {
            toggleInventoryMenu(false);
        }

        function resetTouchState() {
            touch.moveId = -1;
            touch.lookId = -1;
            touch.lx = 0;
            touch.ly = 0;
            input.f = 0;
            input.r = 0;
            document.getElementById('joy-stick').style.transform = 'translate(0, 0)';
        }

        function buildTexturePackUI() {
            const container = document.getElementById('texture-packs');
            container.innerHTML = '';
            Object.keys(TEXTURE_PACKS).forEach(packKey => {
                const pack = TEXTURE_PACKS[packKey];
                const div = document.createElement('div');
                div.className = 'tex-pack' + (packKey === currentPack ? ' active' : '');
                const preview = document.createElement('div');
                preview.className = 'tex-preview';
                const oldPack = currentPack;
                currentPack = packKey;
                const previewTex = createBlockTexture(1);
                currentPack = oldPack;
                preview.style.backgroundImage = `url(${previewTex.image.toDataURL()})`;
                previewTex.dispose();
                const label = document.createElement('div');
                label.textContent = pack.name;
                div.appendChild(preview);
                div.appendChild(label);
                div.onclick = () => {
                    currentPack = packKey;
                    document.querySelectorAll('.tex-pack').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    reloadAllChunks();
                };
                container.appendChild(div);
            });
        }

        function setupEvents() {
            document.addEventListener('fullscreenchange', () => {
                document.getElementById('fs-btn').innerText = document.fullscreenElement ? '✕' : '⛶';
            });

            window.addEventListener('resize', onResize);

            document.getElementById('fs-btn').onclick = async () => {
                try {
                    if (!document.fullscreenElement) {
                        await document.documentElement.requestFullscreen();
                        if (screen.orientation?.lock) screen.orientation.lock('landscape').catch(() => {});
                    } else await document.exitFullscreen();
                } catch (err) {}
            };

            document.getElementById('settings-btn').onclick = () => toggleSettingsMenu();
            document.getElementById('inv-btn').onclick = () => toggleInventoryMenu();
            document.getElementById('close-inv').onclick = () => toggleInventoryMenu(false);
            document.getElementById('save-btn').onclick = saveWorld;
            document.getElementById('respawn-btn').onclick = respawn;

            document.getElementById('cmd-btn').onclick = () => {
                const el = document.getElementById('cmd-input');
                processCommand(el.value);
                el.value = '';
                el.blur();
            };
            document.getElementById('cmd-input').addEventListener('keydown', e => {
                if (e.key === 'Enter') { processCommand(e.target.value); e.target.value = ''; e.target.blur(); }
            });

            document.getElementById('sens-range').oninput = e => {
                settings.sensitivity = Number(e.target.value) * 0.0005;
            };

            document.getElementById('vol-range').oninput = e => {
                settings.volume = Number(e.target.value) / 100;
            };

            document.getElementById('qual-select').onchange = e => {
                renderer.setPixelRatio(parseFloat(e.target.value));
                onResize();
            };

            document.getElementById('render-select').onchange = e => {
                RENDER_DIST = parseInt(e.target.value);
            };

            // Game mode buttons
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.onclick = () => {
                    gameMode = btn.dataset.mode;
                    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('ui').classList.toggle('creative-mode', gameMode === 'creative');
                    chatMsg('Mode: ' + gameMode, 'achievement');
                    if (gameMode === 'creative') {
                        player.health = 20;
                        player.hunger = 20;
                    }
                    updateHUD();
                };
            });

            // Action buttons - uzun basılırsa otomatik tekrarla
            const breakBtn = document.getElementById('break-btn');
            const buildBtn = document.getElementById('build-btn');

            let breakInterval = null, buildInterval = null;

            breakBtn.addEventListener('touchstart', e => {
                e.preventDefault();
                performAction(false);
                breakInterval = setInterval(() => performAction(false), 350);
            });
            breakBtn.addEventListener('touchend', () => { clearInterval(breakInterval); breakInterval = null; });
            breakBtn.addEventListener('touchcancel', () => { clearInterval(breakInterval); breakInterval = null; });

            buildBtn.addEventListener('touchstart', e => {
                e.preventDefault();
                performAction(true);
                buildInterval = setInterval(() => performAction(true), 250);
            });
            buildBtn.addEventListener('touchend', () => { clearInterval(buildInterval); buildInterval = null; });
            buildBtn.addEventListener('touchcancel', () => { clearInterval(buildInterval); buildInterval = null; });

            // Desktop click
            breakBtn.addEventListener('mousedown', e => { e.preventDefault(); performAction(false); });
            buildBtn.addEventListener('mousedown', e => { e.preventDefault(); performAction(true); });

            document.getElementById('jump-btn').addEventListener('touchstart', e => {
                e.preventDefault();
                if (player.onGround) {
                    player.vel.y = 0.2;
                    player.onGround = false;
                    playSound('jump', 0.3);
                }
            });

            // Sprint button
            const sprintBtn = document.getElementById('sprint-btn');
            sprintBtn.addEventListener('touchstart', e => {
                e.preventDefault();
                player.sprinting = !player.sprinting;
                sprintBtn.classList.toggle('sprint-active', player.sprinting);
            });

            // Eat on active slot double tap - basit implementasyon
            let lastHotbarTap = 0;
            document.getElementById('hotbar').addEventListener('click', e => {
                const slot = e.target.closest('.inv-slot');
                if (!slot) return;
                const now = Date.now();
                if (now - lastHotbarTap < 400) {
                    // Double tap - yemek tüket
                    const item = inventory.hotbar[inventory.activeSlot];
                    if (item && ITEMS[item.id]?.food && player.hunger < 20) {
                        eatFood(ITEMS[item.id].food);
                        removeFromActiveSlot(1);
                    }
                }
                lastHotbarTap = now;
            });

            // Joystick
            const joyBase = document.getElementById('joy-base');
            const joyStick = document.getElementById('joy-stick');

            joyBase.addEventListener('touchstart', e => {
                const t = e.changedTouches[0];
                touch.moveId = t.identifier;
                touch.sx = t.clientX;
                touch.sy = t.clientY;
                initAudio();
            }, { passive: true });

            window.addEventListener('touchmove', e => {
                const menuOpen = document.getElementById('settings-menu').style.display === 'block'
                              || document.getElementById('inventory-menu').style.display === 'block';
                if (menuOpen) return;

                for (const t of e.changedTouches) {
                    if (t.identifier === touch.moveId) {
                        const dx = t.clientX - touch.sx;
                        const dy = t.clientY - touch.sy;
                        const d = Math.min(Math.sqrt(dx * dx + dy * dy), 40);
                        const a = Math.atan2(dy, dx);
                        joyStick.style.transform = `translate(${Math.cos(a) * d}px, ${Math.sin(a) * d}px)`;
                        input.f = -Math.sin(a) * (d / 40);
                        input.r = Math.cos(a) * (d / 40);
                    } else if (t.clientX > window.innerWidth / 2) {
                        if (touch.lookId === -1 || touch.lookId === t.identifier) {
                            if (touch.lookId === -1) touch.lookId = t.identifier;
                            if (touch.lx || touch.ly) {
                                camera.rotation.y -= (t.clientX - touch.lx) * settings.sensitivity * 15;
                                camera.rotation.x = Math.max(-1.5, Math.min(1.5,
                                    camera.rotation.x - (t.clientY - touch.ly) * settings.sensitivity * 15
                                ));
                            }
                            touch.lx = t.clientX;
                            touch.ly = t.clientY;
                        }
                    }
                }
            }, { passive: true });

            window.addEventListener('touchend', e => {
                for (const t of e.changedTouches) {
                    if (t.identifier === touch.moveId) {
                        touch.moveId = -1;
                        input.f = 0; input.r = 0;
                        joyStick.style.transform = 'translate(0, 0)';
                    }
                    if (t.identifier === touch.lookId) {
                        touch.lookId = -1;
                        touch.lx = 0; touch.ly = 0;
                    }
                }
            }, { passive: true });

            // Keyboard for desktop
            const keys = {};
            window.addEventListener('keydown', e => {
                keys[e.key.toLowerCase()] = true;
                if (e.key === 'e' || e.key === 'E') toggleInventoryMenu();
                if (e.key === 'Escape') { toggleInventoryMenu(false); toggleSettingsMenu(false); }
                if (e.key === ' ' && player.onGround) { player.vel.y = 0.2; player.onGround = false; playSound('jump', 0.3); }
                // Hotbar 1-9
                const n = parseInt(e.key);
                if (n >= 1 && n <= 9) { inventory.activeSlot = n-1; updateInventoryUI(); }
            });
            window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

            setInterval(() => {
                if (document.activeElement?.id === 'cmd-input') return;
                let f = 0, r = 0;
                if (keys['w']) f = 1;
                if (keys['s']) f = -1;
                if (keys['a']) r = -1;
                if (keys['d']) r = 1;
                if (keys['w']||keys['a']||keys['s']||keys['d']) {
                    input.f = f; input.r = r;
                } else if (touch.moveId === -1) {
                    input.f = 0; input.r = 0;
                }
            }, 50);

            // Auto-save her 30 saniyede
            setInterval(saveWorld, 30000);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ============ MAIN LOOP ============
        let tickCounter = 0;

        function animate() {
            requestAnimationFrame(animate);

            frames++;
            const now = performance.now();
            if (now - lastTime >= 1000) {
                const fps = Math.round((frames * 1000) / (now - lastTime));
                const ping = Math.floor(Math.random() * 15) + 15;
                if (DOM.perfStats) DOM.perfStats.innerText = `FPS: ${fps} | PING: ${ping}ms`;
                frames = 0;
                lastTime = now;
            }

            tickCounter++;

            if (portalCooldown > 0) portalCooldown--;

            // Fizik
            player.onGround = false;
            player.vel.y -= 0.01;


            // Yeniden kullanılan vektörler (GC baskısı azalt)
            _forwardV.set(0, 0, -1).applyQuaternion(camera.quaternion);
            _forwardV.y = 0; _forwardV.normalize();
            _rightV.set(0, 1, 0).cross(_forwardV).negate();
            const speed = player.sprinting ? 0.22 : 0.15;
            const actualSpeed = speed;
            _moveV.set(0, 0, 0)
                .addScaledVector(_forwardV, input.f * actualSpeed)
                .addScaledVector(_rightV, input.r * actualSpeed);

            // O(1) katı kontrolü (Set üzerinden)
            const checkCollision = (px_, py_, pz_) => {
                const r = player.radius, h = player.height;
                for (let i = 0; i < 12; i++) {
                    const o = COLLISION_OFFSETS[i];
                    // o[1]: -1 => -h,  -0.5 => -h/2,  0 => 0
                    const yOff = o[1] === -1 ? -h : (o[1] === -0.5 ? -h * 0.5 : 0);
                    const b = getBlock(px_ + o[0] * r, py_ + yOff, pz_ + o[2] * r);
                    if (b > 0 && !NON_BLOCKING_SET.has(b)) {
                        // Foliage (çiçek/yaprak/kaktüs) da çarpışmasız
                        const fl = BLOCKS[b] && BLOCKS[b].flags;
                        if (!(fl && fl.f)) return true;
                    }
                }
                return false;
            };

            const ppos = player.pos;
            const nextX = ppos.x + _moveV.x;
            if (!checkCollision(nextX, ppos.y, ppos.z)) ppos.x = nextX;
            const nextZ = ppos.z + _moveV.z;
            if (!checkCollision(ppos.x, ppos.y, nextZ)) ppos.z = nextZ;
            ppos.y += player.vel.y;
            if (checkCollision(ppos.x, ppos.y, ppos.z)) {
                if (player.vel.y < 0) {
                    player.onGround = true;
                    // Düşme hasarı
                    if (player.vel.y < -0.5 && gameMode === 'survival') {
                        damagePlayer(Math.floor(-player.vel.y * 5 - 2), 'düşme');
                    }
                }
                ppos.y -= player.vel.y;
                player.vel.y = 0;
            }

            // Lav hasarı
            const bodyBlock = getBlock(player.pos.x, player.pos.y - player.height/2, player.pos.z);
            if (bodyBlock === 14 && tickCounter % 20 === 0) damagePlayer(4, 'lav');

            camera.position.copy(player.pos);

            if (player.pos.y < -30) {
                if (currentDimension !== 'overworld') switchDimension('overworld');
                player.pos.set(8, 45, player.pos.z);
                player.vel.y = 0;
                if (gameMode === 'survival') damagePlayer(10, 'boşluk');
            }

            // Hunger tick
            if (tickCounter % 200 === 0 && gameMode === 'survival') {
                if (player.hunger > 0) player.hunger = Math.max(0, player.hunger - 0.5);
                else damagePlayer(1, 'açlık');

                // Heal yavaş
                if (player.hunger > 15 && player.health < player.maxHealth) {
                    player.health = Math.min(player.maxHealth, player.health + 1);
                }
                updateHUD();
            }

            // Coords (her 3 frame'de bir yeterli)
            if (DOM.coordStats && tickCounter % 3 === 0) {
                DOM.coordStats.innerText =
                    `XYZ: ${Math.floor(player.pos.x)} / ${Math.floor(player.pos.y)} / ${Math.floor(player.pos.z)}`;
            }

            // Biome
            if (tickCounter % 30 === 0 && DOM.biomeStats) {
                const biome = getBiome(Math.floor(player.pos.x), Math.floor(player.pos.z));
                DOM.biomeStats.textContent = 'Biome: ' + biome;
            }

            // Day/Night
            if (tickCounter % 10 === 0) updateDayNight();

            // Monster (Immortality)
            if (currentDimension === 'immortality') {
                if (!monsterState.jumpscare) {
                    monsterMesh.visible = true;
                    monsterMesh.position.set(8, 34, player.pos.z - 20);
                    monsterMesh.lookAt(camera.position);
                    const walked = monsterState.startZ - player.pos.z;
                    if (walked >= 45) monsterState.jumpscare = true;
                } else {
                    monsterMesh.position.lerp(camera.position, 0.25);
                    monsterMesh.scale.addScalar(0.3);
                    if (monsterMesh.position.distanceTo(camera.position) < 2.5) {
                        const jsOverlay = document.getElementById('jumpscare-overlay');
                        jsOverlay.style.opacity = '1';
                        monsterState.jumpscare = false;
                        monsterMesh.visible = false;
                        monsterState.active = false;
                        setTimeout(() => {
                            jsOverlay.style.opacity = '0';
                            switchDimension('overworld');
                            if (gameMode === 'survival') damagePlayer(10, 'canavar');
                        }, 500);
                    }
                }
            } else {
                monsterMesh.visible = false;
            }

            // Portal
            const pxBlock = Math.floor(player.pos.x);
            const pyBlock = Math.floor(player.pos.y - player.height / 2);
            const pzBlock = Math.floor(player.pos.z);
            let portalY = -1;
            if (getBlock(pxBlock, pyBlock, pzBlock) === 8) portalY = pyBlock;
            else if (getBlock(pxBlock, Math.floor(player.pos.y), pzBlock) === 8) portalY = Math.floor(player.pos.y);

            if (portalCooldown === 0 && portalY !== -1) {
                const neighbors = [
                    getBlock(pxBlock + 1, portalY, pzBlock),
                    getBlock(pxBlock - 1, portalY, pzBlock),
                    getBlock(pxBlock, portalY, pzBlock + 1),
                    getBlock(pxBlock, portalY, pzBlock - 1)
                ];
                let obs = 0, glw = 0, grs = 0;
                neighbors.forEach(b => {
                    if (b === 6) obs++;
                    if (b === 7) glw++;
                    if (b === 1) grs++;
                });
                if (obs >= 3) switchDimension(currentDimension === 'nether' ? 'overworld' : 'nether');
                else if (glw >= 3) switchDimension(currentDimension === 'heaven' ? 'overworld' : 'heaven');
                else if (grs >= 3) switchDimension(currentDimension === 'immortality' ? 'overworld' : 'immortality');
            }

            // Ghosts (sadece immortality boyutunda aktif — diğerinde tek sefer gizle)
            if (currentDimension === 'immortality') {
                const dNow = Date.now();
                for (let i = 0; i < ghosts.length; i++) {
                    const g = ghosts[i];
                    const gm = g.mesh;
                    if (!gm.visible) {
                        gm.visible = true;
                        const isRight = Math.random() > 0.5;
                        gm.position.set(
                            isRight ? player.pos.x + 10 + Math.random() * 15 : player.pos.x - 10 - Math.random() * 15,
                            30 + Math.random() * 10,
                            player.pos.z + (Math.random() * 40 - 20)
                        );
                    }
                    gm.position.y += Math.sin((dNow + g.offsetTime) * 0.002) * g.speedY;
                    if (gm.position.z > player.pos.z + 25) gm.position.z -= 50;
                    if (gm.position.z < player.pos.z - 25) gm.position.z += 50;
                    gm.position.x += Math.sin(dNow * 0.001 + i) * 0.01;
                }
            } else if (ghosts.length && ghosts[0].mesh.visible) {
                // Tek sefer tümünü gizle
                for (let i = 0; i < ghosts.length; i++) ghosts[i].mesh.visible = false;
            }

            // Chunk generation + unload (THROTTLED)
            const px = Math.floor(player.pos.x / CHUNK_X);
            const pz = Math.floor(player.pos.z / CHUNK_Z);

            // Oyuncu yeni bir chunk'a geçtiyse kuyruğu yeniden doldur
            if (px !== lastPlayerChunkX || pz !== lastPlayerChunkZ) {
                lastPlayerChunkX = px;
                lastPlayerChunkZ = pz;
                // Spiral sıra: merkezden dışa (en yakınlar önce)
                for (let r = 0; r <= RENDER_DIST; r++) {
                    for (let x = px - r; x <= px + r; x++) {
                        for (let z = pz - r; z <= pz + r; z++) {
                            const dx = Math.abs(x - px), dz = Math.abs(z - pz);
                            if (Math.max(dx, dz) !== r) continue;
                            const k = `${x},0,${z}`;
                            if (!chunks[k] && !chunkGenSet.has(k)) {
                                chunkGenQueue.push([x, 0, z]);
                                chunkGenSet.add(k);
                            }
                        }
                    }
                }
            }

            // Frame başına en fazla 1 chunk üret (lag spike önleme)
            if (chunkGenQueue.length > 0) {
                const [qx, qy, qz] = chunkGenQueue.shift();
                chunkGenSet.delete(`${qx},${qy},${qz}`);
                if (!chunks[`${qx},${qy},${qz}`]) generateChunk(qx, qy, qz);
            }

            // Kirli chunk'ları frame başına 2'şerli işle (setBlock sonrası re-mesh)
            processDirtyChunks(2);

            // Unload far chunks
            if (tickCounter % 60 === 0) {
                const limit = RENDER_DIST + 1;
                Object.keys(chunkMeshes).forEach(key => {
                    const [cx, , cz] = key.split(',').map(Number);
                    if (Math.abs(cx - px) > limit || Math.abs(cz - pz) > limit) {
                        const arr = chunkMeshes[key];
                        for (let i = 0; i < arr.length; i++) {
                            scene.remove(arr[i]);
                            arr[i].dispose && arr[i].dispose();
                        }
                        delete chunkMeshes[key];
                        flatMeshCacheDirty = true;
                    }
                });
            }

            // Dropped items update
            updateDroppedItems();

            // Selection box (her 2 frame'de bir yeterli; raycast pahalı)
            if (tickCounter % 2 === 0) {
                raycaster.setFromCamera(_tmpVec1, camera);
                const hits = raycaster.intersectObjects(getNearbyMeshes(), false);
                selectionBox.visible = hits.length > 0;

                const blockInfo = DOM.blockInfo;
                if (hits.length > 0) {
                    const hp = hits[0].point;
                    const hn = hits[0].face.normal;
                    const bx = Math.floor(hp.x - hn.x * 0.5);
                    const by = Math.floor(hp.y - hn.y * 0.5);
                    const bz = Math.floor(hp.z - hn.z * 0.5);
                    selectionBox.position.set(bx + 0.5, by + 0.5, bz + 0.5);
                    const bt = getBlock(bx, by, bz);
                    if (blockInfo) {
                        if (bt && BLOCKS[bt]) {
                            blockInfo.textContent = BLOCKS[bt].name;
                            blockInfo.classList.add('visible');
                        } else {
                            blockInfo.classList.remove('visible');
                        }
                    }
                } else if (blockInfo) {
                    blockInfo.classList.remove('visible');
                }
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
