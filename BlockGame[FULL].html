<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Voxel Engine Pro - Minecraft Edition</title>
    
    <style>
    /* ============================================
       VOXEL ENGINE PRO - MINECRAFT EDITION
       ============================================ */

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        overflow: hidden;
        background: #87ceeb;
        font-family: sans-serif;
        user-select: none;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
    }

    canvas {
        display: block;
        width: 100vw;
        height: 100vh;
    }

    #ui {
        position: absolute;
        inset: 0;
        pointer-events: none;
        transition: opacity 0.3s;
    }

    /* Menü açıkken kontrolleri gizle */
    #ui.settings-open #joy-base,
    #ui.settings-open .btn-container,
    #ui.settings-open #hotbar,
    #ui.settings-open #crosshair,
    #ui.settings-open #block-info,
    #ui.inventory-open #joy-base,
    #ui.inventory-open .btn-container,
    #ui.inventory-open #hotbar,
    #ui.inventory-open #crosshair,
    #ui.inventory-open #block-info {
        opacity: 0;
        pointer-events: none !important;
    }

    #joy-base, .btn-container, #hotbar, #crosshair, #stats, #block-info {
        transition: opacity 0.25s;
    }

    /* ============ STATS PANEL ============ */
    #stats {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.55);
        color: #0f0;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 12px;
        pointer-events: auto;
        backdrop-filter: blur(4px);
        min-width: 160px;
    }

    #dim-stats {
        color: #55ff55;
        font-weight: bold;
        margin-bottom: 4px;
        font-size: 14px;
    }

    #biome-stats, #time-stats {
        color: #ffeb3b;
        font-size: 11px;
        margin-top: 2px;
    }

    #perf-stats {
        color: #fff;
        font-size: 10px;
        margin-top: 4px;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
        padding-top: 4px;
    }

    /* ============ HUD BARS (Can, Açlık, XP) ============ */
    #hud-bars {
        position: absolute;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        gap: 4px;
        pointer-events: none;
        z-index: 5;
    }

    .stat-bar {
        display: flex;
        gap: 2px;
        justify-content: center;
        filter: drop-shadow(1px 1px 2px black);
    }

    .stat-icon {
        width: 18px;
        height: 18px;
        display: inline-block;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
    }

    .heart { color: #ff3838; font-size: 18px; line-height: 1; }
    .heart.empty { opacity: 0.25; }
    .heart.half { opacity: 0.6; }

    .hunger { color: #c08040; font-size: 18px; line-height: 1; }
    .hunger.empty { opacity: 0.25; }

    #xp-bar {
        width: 280px;
        height: 10px;
        background: rgba(0,0,0,0.6);
        border: 1px solid #555;
        border-radius: 3px;
        position: relative;
        overflow: hidden;
        margin-top: 2px;
    }

    #xp-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #4caf50, #8bc34a);
        transition: width 0.3s;
    }

    #xp-level {
        position: absolute;
        left: 50%;
        top: -18px;
        transform: translateX(-50%);
        color: #7fff00;
        font-weight: bold;
        font-size: 13px;
        text-shadow: 2px 2px 2px black;
    }

    /* ============ TOP BUTTONS ============ */
    .ui-btn {
        position: absolute;
        width: 48px;
        height: 48px;
        background: rgba(0, 0, 0, 0.55);
        border: 2px solid rgba(255,255,255,0.7);
        border-radius: 8px;
        color: white;
        font-size: 22px;
        pointer-events: auto;
        z-index: 10;
        cursor: pointer;
        backdrop-filter: blur(4px);
    }

    .ui-btn:active {
        background: rgba(255,255,255,0.3);
    }

    #fs-btn { top: 10px; right: 10px; }
    #settings-btn { top: 66px; right: 10px; }
    #inv-btn { top: 122px; right: 10px; }
    #save-btn { top: 178px; right: 10px; font-size: 20px; }

    /* ============ PANEL (Settings & Inventory) ============ */
    .panel {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(15, 15, 20, 0.95);
        color: white;
        padding: 18px;
        border-radius: 14px;
        display: none;
        pointer-events: auto;
        width: 92vw;
        max-width: 420px;
        max-height: 88vh;
        overflow-y: auto;
        border: 2px solid rgba(255,255,255,0.15);
        box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        z-index: 20;
    }

    .menu-item {
        margin-bottom: 14px;
    }

    .menu-item.bordered {
        border-top: 1px solid #333;
        padding-top: 12px;
    }

    .menu-title {
        font-size: 11px;
        opacity: 0.75;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 6px;
        color: #aaa;
    }

    .creative-title {
        display: none;
    }

    #ui.creative-mode #creative-title,
    #ui.creative-mode #creative-palette {
        display: block;
    }

    input[type="range"] {
        width: 100%;
        accent-color: #00e676;
    }

    select, #cmd-input {
        width: 100%;
        padding: 7px;
        font-size: 13px;
        border-radius: 6px;
        border: 1px solid #555;
        background: #222;
        color: white;
    }

    #cmd-btn {
        width: 100%;
        margin-top: 6px;
        background: #00796b;
        color: white;
        border: none;
        padding: 8px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
    }

    #cmd-btn:active { background: #004d40; }

    /* ============ TEXTURE PACKS ============ */
    .texture-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
    }

    .tex-pack {
        padding: 8px 4px;
        border: 2px solid rgba(255,255,255,0.2);
        border-radius: 8px;
        text-align: center;
        font-size: 11px;
        cursor: pointer;
        background: rgba(255,255,255,0.05);
    }

    .tex-pack.active {
        border-color: #00e676;
        background: rgba(0, 230, 118, 0.25);
    }

    .tex-preview {
        width: 100%;
        height: 30px;
        border-radius: 4px;
        margin-bottom: 4px;
        background-size: cover;
    }

    /* ============ MODE BUTTONS ============ */
    .mode-buttons {
        display: flex;
        gap: 8px;
    }

    .mode-btn {
        flex: 1;
        padding: 8px;
        border: 2px solid #555;
        background: #222;
        color: white;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
    }

    .mode-btn.active {
        border-color: #00e676;
        background: rgba(0, 230, 118, 0.25);
    }

    /* ============ INVENTORY (MINECRAFT STYLE) ============ */
    #inventory-menu {
        background: #c6c6c6;
        color: #3f3f3f;
        border: 4px solid #000;
        border-radius: 0;
        padding: 8px;
        box-shadow: inset -2px -2px 0 #555, inset 2px 2px 0 #fff, 4px 4px 0 rgba(0,0,0,0.5);
        font-family: 'Segoe UI', Tahoma, sans-serif;
        image-rendering: pixelated;
        max-width: 360px;
        width: 94vw;
    }

    .inv-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
        padding: 2px 4px;
    }

    .inv-title {
        font-size: 16px;
        font-weight: bold;
        color: #3f3f3f;
        text-shadow: 1px 1px 0 #a0a0a0;
        letter-spacing: 1px;
    }

    #close-inv {
        background: #c6c6c6;
        border: 2px solid;
        border-color: #fff #555 #555 #fff;
        color: #3f3f3f;
        width: 26px;
        height: 26px;
        border-radius: 0;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
        padding: 0;
    }
    #close-inv:active {
        border-color: #555 #fff #fff #555;
    }

    .menu-title {
        color: #3f3f3f !important;
        font-size: 11px;
        font-weight: bold;
        text-transform: none;
        letter-spacing: 0;
        margin: 4px 0 3px 2px;
    }

    /* Crafting & inv panel inherits Minecraft look */
    #inventory-menu .menu-title { color: #3f3f3f; }

    .inv-grid {
        display: grid;
        grid-template-columns: repeat(9, 1fr);
        gap: 0;
        padding: 3px;
        background: #8b8b8b;
        border: 2px solid;
        border-color: #555 #fff #fff #555;
        margin-bottom: 6px;
    }

    .hotbar-grid {
        background: #8b8b8b;
        margin-top: 6px;
    }

    .inv-slot {
        aspect-ratio: 1;
        background: #8b8b8b;
        border: 2px solid;
        border-color: #373737 #ffffff #ffffff #373737;
        border-radius: 0;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        cursor: pointer;
        overflow: hidden;
        margin: 1px;
        min-width: 30px;
        min-height: 30px;
    }

    .inv-slot:hover {
        background: #b0b0b0;
    }

    .inv-slot.has-item {
        background: #8b8b8b;
    }

    .inv-slot.has-item:hover {
        background: #a8a8a8;
        box-shadow: inset 0 0 0 2px #ffffff80;
    }

    .inv-slot.selected {
        border-color: #ffffff;
        box-shadow: inset 0 0 0 2px #ffffff;
    }

    .inv-slot .item-count {
        position: absolute;
        bottom: 0px;
        right: 2px;
        font-size: 12px;
        color: #ffffff;
        font-weight: bold;
        text-shadow: 1px 1px 0 #3f3f3f;
        pointer-events: none;
        font-family: monospace;
    }

    .inv-slot .item-icon {
        width: 80%;
        height: 80%;
        background-size: cover;
        background-position: center;
        image-rendering: pixelated;
        border-radius: 0;
    }

    .inv-slot.drag-over {
        background: #d8d8d8;
    }

    /* Hotbar in-menu highlight for active slot */
    .hotbar-grid .inv-slot.active-slot {
        border-color: #ffffff;
        box-shadow: inset 0 0 0 2px #ffffff;
    }

    /* Separator between main inv and hotbar (Minecraft gap) */
    .inv-separator {
        height: 8px;
    }

    /* ============ CRAFTING (MINECRAFT 3x3) ============ */
    .craft-section {
        margin-bottom: 10px;
        padding: 6px 8px 8px;
        background: transparent;
        border-radius: 0;
    }

    .craft-area {
        display: flex;
        align-items: center;
        gap: 14px;
        justify-content: center;
        padding: 6px 0;
    }

    .craft-grid {
        display: grid;
        grid-template-columns: repeat(3, 34px);
        grid-template-rows: repeat(3, 34px);
        gap: 0;
        padding: 3px;
        background: #8b8b8b;
        border: 2px solid;
        border-color: #555 #fff #fff #555;
    }

    .craft-grid .inv-slot {
        width: 34px;
        height: 34px;
        min-width: 34px;
        min-height: 34px;
    }

    .craft-arrow {
        font-size: 26px;
        color: #3f3f3f;
        font-weight: bold;
    }

    .craft-output-wrap {
        padding: 4px;
        background: #8b8b8b;
        border: 2px solid;
        border-color: #555 #fff #fff #555;
    }
    .craft-output-wrap .inv-slot {
        width: 44px;
        height: 44px;
        min-width: 44px;
        min-height: 44px;
    }

    /* ============ HELD ITEM (FOLLOWS CURSOR) ============ */
    #held-item {
        position: fixed;
        pointer-events: none;
        width: 36px;
        height: 36px;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        z-index: 9999;
        transform: translate(-50%, -50%);
        filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.6));
    }
    #held-item.active { display: flex; }
    #held-item .item-count {
        position: absolute;
        bottom: -2px;
        right: -2px;
        font-size: 12px;
        color: #fff;
        font-weight: bold;
        text-shadow: 1px 1px 0 #000;
        font-family: monospace;
    }

    /* ============ CREATIVE PALETTE ============ */
    .creative-palette {
        display: none;
        grid-template-columns: repeat(9, 1fr);
        gap: 3px;
        max-height: 200px;
        overflow-y: auto;
        padding: 6px;
        background: rgba(0,0,0,0.4);
        border-radius: 8px;
    }

    /* ============ JOYSTICK ============ */
    #joy-base {
        position: absolute;
        bottom: 35px;
        left: 35px;
        width: 120px;
        height: 120px;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid #fff;
        border-radius: 50%;
        pointer-events: auto;
    }

    #joy-stick {
        position: absolute;
        top: 35px;
        left: 35px;
        width: 50px;
        height: 50px;
        background: rgba(255,255,255,0.9);
        border-radius: 50%;
        transform: translate(0, 0);
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    /* ============ ACTION BUTTONS ============ */
    .btn-container {
        position: absolute;
        bottom: 35px;
        right: 35px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        pointer-events: auto;
    }

    .action-row {
        display: flex;
        gap: 12px;
    }

    .circle-btn {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        border: 3px solid #fff;
        background: rgba(0, 0, 0, 0.55);
        color: white;
        font-weight: bold;
        font-size: 13px;
        touch-action: none;
        cursor: pointer;
        transition: transform 0.1s;
    }

    .circle-btn:active {
        transform: scale(0.9);
    }

    .circle-btn.small {
        width: 52px;
        height: 52px;
        font-size: 20px;
    }

    .circle-btn.break { background: rgba(255, 82, 82, 0.7); }
    .circle-btn.build { background: rgba(0, 230, 118, 0.7); }
    .circle-btn.sprint-active { background: rgba(255, 200, 0, 0.8); }

    /* ============ HOTBAR ============ */
    #hotbar {
        position: absolute;
        bottom: 15px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 3px;
        background: rgba(0, 0, 0, 0.7);
        padding: 6px;
        border-radius: 10px;
        pointer-events: auto;
        border: 1px solid rgba(255,255,255,0.2);
    }

    #hotbar .inv-slot {
        width: 44px;
        height: 44px;
        border-radius: 6px;
    }

    #hotbar .inv-slot.selected {
        border-color: #ffffff;
        transform: scale(1.1);
        background: rgba(255,255,255,0.2);
    }

    /* ============ CROSSHAIR ============ */
    #crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 22px;
        height: 22px;
        pointer-events: none;
        border: 2px solid white;
        border-radius: 50%;
        opacity: 0.6;
        mix-blend-mode: difference;
    }

    #crosshair::before, #crosshair::after {
        content: '';
        position: absolute;
        background: white;
        left: 50%;
        top: 50%;
    }

    #crosshair::before { width: 2px; height: 10px; transform: translate(-50%, -50%); }
    #crosshair::after { width: 10px; height: 2px; transform: translate(-50%, -50%); }

    /* ============ BLOCK INFO ============ */
    #block-info {
        position: absolute;
        top: 60%;
        left: 50%;
        transform: translate(-50%, 0);
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 12px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s;
    }

    #block-info.visible { opacity: 1; }

    /* ============ OVERLAYS ============ */
    #jumpscare-overlay, #damage-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        z-index: 999;
    }

    #jumpscare-overlay {
        background: #ff0000;
        transition: opacity 0.1s;
    }

    #damage-overlay {
        background: radial-gradient(ellipse at center, transparent 30%, rgba(255,0,0,0.6) 100%);
        transition: opacity 0.4s;
    }

    /* ============ CHAT LOG ============ */
    #chat-log {
        position: absolute;
        bottom: 220px;
        left: 15px;
        max-width: 60vw;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .chat-msg {
        background: rgba(0,0,0,0.6);
        color: white;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 12px;
        animation: fadeInOut 4s forwards;
        max-width: 100%;
    }

    .chat-msg.achievement { color: #ffeb3b; border-left: 3px solid #ffeb3b; }
    .chat-msg.error { color: #ff5252; }
    .chat-msg.system { color: #4fc3f7; }

    @keyframes fadeInOut {
        0% { opacity: 0; transform: translateX(-10px); }
        10% { opacity: 1; transform: translateX(0); }
        80% { opacity: 1; }
        100% { opacity: 0; transform: translateX(10px); }
    }

    /* ============ DEATH SCREEN ============ */
    #death-screen {
        position: absolute;
        inset: 0;
        background: rgba(60, 0, 0, 0.85);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 500;
        pointer-events: auto;
        color: white;
    }

    #death-screen.visible { display: flex; }

    .death-title {
        font-size: 48px;
        color: #ff4444;
        font-weight: bold;
        margin-bottom: 20px;
        text-shadow: 4px 4px 8px black;
    }

    .death-text {
        font-size: 16px;
        opacity: 0.8;
        margin-bottom: 30px;
    }

    #respawn-btn {
        padding: 14px 40px;
        font-size: 18px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }

    #respawn-btn:active { background: #2e7d32; }

    :fullscreen, :-webkit-full-screen {
        background: #000;
    }

    /* ============ SCROLLBAR ============ */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
    ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #777; }

    /* ============ MOBILE OPTIMIZATION ============ */
    @media (max-width: 600px) {
        .panel { width: 95vw; padding: 14px; }
        .inv-grid { grid-template-columns: repeat(9, 1fr); gap: 2px; }
        .circle-btn { width: 64px; height: 64px; font-size: 11px; }
        #joy-base { width: 100px; height: 100px; bottom: 20px; left: 20px; }
        #joy-stick { width: 42px; height: 42px; top: 29px; left: 29px; }
        #hotbar .inv-slot { width: 38px; height: 38px; }
    }
    </style>
</head>
<body>
    <div id="jumpscare-overlay"></div>
    <div id="damage-overlay"></div>

    <div id="ui">
        <div id="stats">
            <div id="dim-stats">Overworld 🌍</div>
            <span id="coord-stats">XYZ: 0 / 0 / 0</span>
            <div id="biome-stats">Biome: Plains</div>
            <div id="time-stats">🌞 Gündüz</div>
            <div id="perf-stats">FPS: 0 | PING: --ms</div>
        </div>

        <div id="hud-bars">
            <div id="health-bar" class="stat-bar"></div>
            <div id="hunger-bar" class="stat-bar"></div>
            <div id="xp-bar">
                <div id="xp-fill"></div>
                <div id="xp-level">0</div>
            </div>
        </div>

        <button id="fs-btn" class="ui-btn">⛶</button>
        <button id="settings-btn" class="ui-btn">⚙️</button>
        <button id="inv-btn" class="ui-btn">🎒</button>
        <button id="save-btn" class="ui-btn">💾</button>

        <div id="settings-menu" class="panel">
            <div class="menu-item">
                <div class="menu-title">Hassasiyet</div>
                <input type="range" id="sens-range" min="1" max="20" value="6" />
            </div>

            <div class="menu-item">
                <div class="menu-title">Kalite</div>
                <select id="qual-select">
                    <option value="1">Yüksek</option>
                    <option value="0.5">Düşük</option>
                </select>
            </div>

            <div class="menu-item">
                <div class="menu-title">Render Mesafesi</div>
                <select id="render-select">
                    <option value="2">Yakın (2)</option>
                    <option value="3" selected>Normal (3)</option>
                    <option value="4">Uzak (4)</option>
                </select>
            </div>

            <div class="menu-item">
                <div class="menu-title">Texture Paketi</div>
                <div class="texture-grid" id="texture-packs"></div>
            </div>

            <div class="menu-item">
                <div class="menu-title">Game Mode</div>
                <div class="mode-buttons">
                    <button class="mode-btn active" data-mode="survival">Survival</button>
                    <button class="mode-btn" data-mode="creative">Creative</button>
                </div>
            </div>

            <div class="menu-item">
                <div class="menu-title">Ses</div>
                <input type="range" id="vol-range" min="0" max="100" value="50" />
            </div>

            <div class="menu-item bordered">
                <div class="menu-title">Komut</div>
                <input type="text" id="cmd-input" placeholder="/nether, /heaven, /immortality, /time day, /give" />
                <button id="cmd-btn">Çalıştır</button>
            </div>
        </div>

        <div id="inventory-menu" class="panel">

        // Audio

        function initAudio() {

        function playSound(type, vol=1) {
            if (!audioCtx) return;
            vol = vol * settings.volume;
            if (vol <= 0) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            let freq = 200, dur = 0.1, type_wave = 'sine';

            switch(type) {
                case 'break_grass': freq=350; dur=0.12; type_wave='triangle'; break;
                case 'break_stone': freq=180; dur=0.15; type_wave='square'; break;
                case 'break_wood':  freq=220; dur=0.15; type_wave='sawtooth'; break;
                case 'break_sand':  freq=280; dur=0.1; type_wave='triangle'; break;
                case 'break_glass': freq=800; dur=0.2; type_wave='triangle'; break;
                case 'place':       freq=500; dur=0.08; type_wave='sine'; break;
                case 'jump':        freq=400; dur=0.07; type_wave='sine'; break;
                case 'hurt':        freq=140; dur=0.25; type_wave='square'; break;
                case 'pickup':      freq=900; dur=0.08; type_wave='sine'; break;
                case 'level_up':    freq=600; dur=0.4; type_wave='triangle'; break;
                case 'eat':         freq=250; dur=0.15; type_wave='triangle'; break;
                case 'portal':      freq=100; dur=1.0; type_wave='sawtooth'; break;
                case 'craft':       freq=450; dur=0.1; type_wave='square'; break;
            }

            osc.frequency.setValueAtTime(freq, now);
            osc.frequency.exponentialRampToValueAtTime(freq*0.7, now+dur);
            osc.type = type_wave;
            gain.gain.setValueAtTime(0.15*vol, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now+dur);
            osc.start(now);
            osc.stop(now+dur);
        }

        // ============ UTILS ============
        function shadeColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.max(0, Math.min(255, (num >> 16) + amt));
            const G = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amt));
            const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
            return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
        }

            setTimeout(() => m.remove(), 4000);

        // ============ TEXTURE GENERATION ============
        function createBlockTexture(blockId) {
            const block = BLOCKS[blockId];
            if (!block || !block.color) return null;

            const style = TEXTURE_PACKS[currentPack].style;
            const color = block.color;
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');

            if (style === 'neon') {
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, 64, 64);
                ctx.shadowBlur = 12;
                ctx.shadowColor = color;
                ctx.strokeStyle = color;
                ctx.lineWidth = 6;
                ctx.strokeRect(3, 3, 58, 58);
                ctx.strokeRect(16, 16, 32, 32);
            }
            else if (style === 'pixel') {
                ctx.fillStyle = color;
                ctx.fillRect(0, 0, 64, 64);
                for (let i = 0; i < 8; i++) {
                    for (let j = 0; j < 8; j++) {
                        const variance = (Math.random() - 0.5) * 40;
                        ctx.fillStyle = shadeColor(color, variance);
                        ctx.fillRect(i * 8, j * 8, 8, 8);
                    }
                }
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 2;
                ctx.strokeRect(0, 0, 64, 64);
            }
            else if (style === 'pastel') {
                const grad = ctx.createLinearGradient(0, 0, 64, 64);
                grad.addColorStop(0, shadeColor(color, 15));
                grad.addColorStop(1, shadeColor(color, -10));
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, 64, 64);
                for (let i = 0; i < 15; i++) {
                    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.15})`;
                    ctx.beginPath();
                    ctx.arc(Math.random() * 64, Math.random() * 64, Math.random() * 6, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            else if (style === 'dark') {
                ctx.fillStyle = color;
                ctx.fillRect(0, 0, 64, 64);
                const grad = ctx.createRadialGradient(32, 32, 10, 32, 32, 45);
                grad.addColorStop(0, 'rgba(0,0,0,0)');
                grad.addColorStop(1, 'rgba(0,0,0,0.7)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, 64, 64);
            }
            else if (style === 'cartoon') {
                ctx.fillStyle = color;
                ctx.fillRect(0, 0, 64, 64);
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 5;
                ctx.strokeRect(2, 2, 60, 60);
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(6, 6, 20, 4);
                ctx.fillRect(6, 6, 4, 20);
            }
            else {
                // classic with per-block details
                ctx.fillStyle = color;
                ctx.fillRect(0, 0, 64, 64);

                if (blockId === 1) { // Çim
                    for (let i = 0; i < 20; i++) {
                        ctx.fillStyle = shadeColor(color, -15 + Math.random() * 20);
                        ctx.fillRect(Math.random() * 64, Math.random() * 64, 3, 3);
                    }
                } else if (blockId === 3 || blockId === 10) { // Taş
                    for (let i = 0; i < 25; i++) {
                        ctx.fillStyle = shadeColor(color, -20 + Math.random() * 40);
                        ctx.fillRect(Math.random() * 64, Math.random() * 64, 4, 4);
                    }
                } else if (blockId === 4 || blockId === 32) { // Odun
                    for (let i = 0; i < 5; i++) {
                        ctx.fillStyle = shadeColor(color, -15);
                        ctx.fillRect(i * 13 + 2, 0, 2, 64);
                    }
                    for (let i = 0; i < 3; i++) {
                        ctx.strokeStyle = shadeColor(color, -25);
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.ellipse(32, 16+i*20, 8-i*2, 3, 0, 0, Math.PI*2);
                        ctx.stroke();
                    }
                } else if (blockId === 2) { // Toprak
                    for (let i = 0; i < 30; i++) {
                        ctx.fillStyle = shadeColor(color, -10 + Math.random() * 20);
                        ctx.fillRect(Math.random() * 64, Math.random() * 64, 2, 2);
                    }
                } else if (blockId === 5) { // Yaprak
                    for (let i = 0; i < 40; i++) {
                        ctx.fillStyle = shadeColor(color, -10 + Math.random() * 25);
                        ctx.beginPath();
                        ctx.arc(Math.random() * 64, Math.random() * 64, Math.random() * 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else if (blockId === 8) { // Portal
                    for (let i = 0; i < 30; i++) {
                        ctx.fillStyle = `rgba(255, ${Math.random() * 100}, 255, ${Math.random()})`;
                        ctx.fillRect(Math.random() * 64, Math.random() * 64, 4, 4);
                    }
                } else if (blockId === 11) { // Kum
                    for (let i = 0; i < 40; i++) {
                        ctx.fillStyle = shadeColor(color, -15 + Math.random() * 25);
                        ctx.fillRect(Math.random() * 64, Math.random() * 64, 2, 2);
                    }
                } else if (blockId === 13) { // Su
                    const grad = ctx.createLinearGradient(0, 0, 64, 64);
                    grad.addColorStop(0, shadeColor(color, 15));
                    grad.addColorStop(0.5, color);
                    grad.addColorStop(1, shadeColor(color, -10));
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, 64, 64);
                    for (let i = 0; i < 5; i++) {
                        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(0, i*14);
                        ctx.bezierCurveTo(20, i*14-4, 40, i*14+4, 64, i*14);
                        ctx.stroke();
                    }
                } else if (blockId === 14) { // Lav
                    for (let i = 0; i < 20; i++) {
                        ctx.fillStyle = `rgba(255,${Math.random()*100+100},0,${0.5+Math.random()*0.5})`;
                        ctx.beginPath();

                        ctx.fill();
                    }
                } else if (blockId === 15) { // Cam
                    ctx.fillStyle = 'rgba(200,240,255,0.3)';
                    ctx.fillRect(0, 0, 64, 64);
                    ctx.strokeStyle = '#d0e8f0';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(1, 1, 62, 62);
                } else if (blockId === 16) { // Kömür ore
                    ctx.fillStyle = '#757575';
                    ctx.fillRect(0, 0, 64, 64);
                    for (let i = 0; i < 8; i++) {
                        ctx.fillStyle = '#1a1a1a';
                        ctx.beginPath();
                        ctx.arc(Math.random()*64, Math.random()*64, 3+Math.random()*3, 0, Math.PI*2);
                        ctx.fill();
                    }
                } else if (blockId === 18) { // Demir ore
                    ctx.fillStyle = '#757575';
                    ctx.fillRect(0, 0, 64, 64);
                    for (let i = 0; i < 6; i++) {
                        ctx.fillStyle = '#d4a97c';
                        ctx.beginPath();
                        ctx.arc(Math.random()*64, Math.random()*64, 3+Math.random()*2, 0, Math.PI*2);
                        ctx.fill();
                    }
                } else if (blockId === 20) { // Altın ore
                    ctx.fillStyle = '#757575';
                    ctx.fillRect(0, 0, 64, 64);
                    for (let i = 0; i < 6; i++) {
                        ctx.fillStyle = '#ffd700';
                        ctx.beginPath();
                        ctx.arc(Math.random()*64, Math.random()*64, 3+Math.random()*2, 0, Math.PI*2);
                        ctx.fill();
                    }
                } else if (blockId === 22) { // Elmas ore
                    ctx.fillStyle = '#757575';
                    ctx.fillRect(0, 0, 64, 64);
                    for (let i = 0; i < 5; i++) {
                        ctx.fillStyle = '#4de0f0';
                        ctx.beginPath();
                        ctx.arc(Math.random()*64, Math.random()*64, 3+Math.random()*2, 0, Math.PI*2);
                        ctx.fill();
                    }
                } else if (blockId === 25) { // Tuğla
                    ctx.fillStyle = shadeColor(color, -20);
                    for (let y = 0; y < 64; y += 16) {
                        const offset = (y/16) % 2 === 0 ? 0 : 16;
                        for (let x = -16; x < 64; x += 32) {
                            ctx.fillRect(x + offset, y, 30, 1);
                        }
                        ctx.fillRect(0, y, 64, 1);
                    }
                } else if (blockId === 26) { // Kaktüs
                    for (let i = 0; i < 10; i++) {
                        ctx.strokeStyle = shadeColor(color, -20);
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(4+i*6, 0);
                        ctx.lineTo(4+i*6, 64);
                        ctx.stroke();
                    }
                    for (let i = 0; i < 20; i++) {
                        ctx.fillStyle = '#ffff99';
                        ctx.fillRect(Math.random()*64, Math.random()*64, 1, 3);
                    }
                } else if (blockId === 27 || blockId === 30) { // Çiçek
                    ctx.fillStyle = shadeColor('#558b2f', 0);
                    ctx.fillRect(0, 0, 64, 64);
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(32, 24, 12, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#ffeb3b';
                    ctx.beginPath();
                    ctx.arc(32, 24, 4, 0, Math.PI*2);
                    ctx.fill();
                    ctx.strokeStyle = '#2e7d32';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(32, 36);
                    ctx.lineTo(32, 64);
                    ctx.stroke();
                } else if (blockId === 28) { // Kar
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, 64, 64);
                    for (let i = 0; i < 20; i++) {
                        ctx.fillStyle = shadeColor('#ffffff', -5);
                        ctx.fillRect(Math.random()*64, Math.random()*64, 2, 2);
                    }
                } else if (blockId === 29) { // Buz
                    const grad = ctx.createLinearGradient(0, 0, 64, 64);
                    grad.addColorStop(0, '#ffffff');
                    grad.addColorStop(1, color);
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, 64, 64);
                    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                    ctx.lineWidth = 1;
                    for (let i = 0; i < 5; i++) {
                        ctx.beginPath();
                        ctx.moveTo(Math.random()*64, Math.random()*64);
                        ctx.lineTo(Math.random()*64, Math.random()*64);
                        ctx.stroke();
                    }
                } else if (blockId === 33) { // Netherrack
                    for (let i = 0; i < 30; i++) {
                        ctx.fillStyle = shadeColor(color, -15 + Math.random() * 25);
                        ctx.fillRect(Math.random() * 64, Math.random() * 64, 3, 3);
                    }
                } else if (blockId === 34) { // Ruh kumu
                    for (let i = 0; i < 20; i++) {
                        ctx.fillStyle = shadeColor(color, -20 + Math.random() * 15);
                        ctx.fillRect(Math.random() * 64, Math.random() * 64, 4, 4);
                    }
                    ctx.fillStyle = 'rgba(200,200,255,0.3)';
                    ctx.beginPath();
                    ctx.arc(20, 30, 6, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(44, 40, 5, 0, Math.PI*2);
                    ctx.fill();
                } else if (blockId === 7) { // Glowstone
                    ctx.fillStyle = color;
                    ctx.fillRect(0, 0, 64, 64);
                    for (let i = 0; i < 12; i++) {
                        ctx.fillStyle = `rgba(255,255,200,${0.3+Math.random()*0.5})`;
                        ctx.beginPath();
                        ctx.arc(Math.random()*64, Math.random()*64, 2+Math.random()*3, 0, Math.PI*2);
                        ctx.fill();
                    }
                }

                ctx.strokeStyle = 'rgba(0,0,0,0.25)';
                ctx.lineWidth = 3;
                ctx.strokeRect(0, 0, 64, 64);
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.magFilter = style === 'pixel' ? THREE.NearestFilter : THREE.LinearFilter;
            texture.minFilter = style === 'pixel' ? THREE.NearestFilter : THREE.LinearMipmapLinearFilter;
            return texture;
        }

        function getBlockMaterial(blockId) {
            const key = `${currentPack}-${blockId}`;
            if (materialCache.has(key)) return materialCache.get(key);

            let texture = textureCache.get(key);
            if (!texture) {
                texture = createBlockTexture(blockId);
                textureCache.set(key, texture);
            }

            const block = BLOCKS[blockId];
            const flags = block.flags || {};
            const transparent = flags.t && !flags.f;
            const opacity = blockId === 13 ? 0.7 : (blockId === 15 ? 0.5 : (flags.t ? 0.9 : 1));
            const style = TEXTURE_PACKS[currentPack].style;

            const material = (style === 'neon' || flags.g)
                ? new THREE.MeshBasicMaterial({
                    map: texture,
                    transparent: transparent || opacity < 1,
                    opacity: opacity,
                    alphaTest: flags.f ? 0.5 : 0,
                    side: flags.f ? THREE.DoubleSide : THREE.FrontSide
                })
                : new THREE.MeshLambertMaterial({
                    map: texture,
                    transparent: transparent || opacity < 1,
                    opacity: opacity,
                    alphaTest: flags.f ? 0.5 : 0,
                    side: flags.f ? THREE.DoubleSide : THREE.FrontSide
                });

            materialCache.set(key, material);
            return material;
        }

        function clearCaches() {
            textureCache.forEach(t => t.dispose());
            textureCache.clear();
            materialCache.forEach(m => m.dispose());
            materialCache.clear();
        }

        function reloadAllChunks() {
            clearCaches();
            const savedDim = currentDimension;

            Object.keys(dimensions).forEach(dimName => {
                const dim = dimensions[dimName];
                Object.values(dim.meshes).flat().forEach(mesh => scene.remove(mesh));
                dim.meshes = {};

                currentDimension = dimName;
                bindCurrentDimensionRefs();
                Object.keys(dim.chunks).forEach(key => {
                    const [cx, cy, cz] = key.split(',').map(Number);
                    renderChunk(cx, cy, cz);
                });
                if (dimName !== savedDim) {
                    Object.values(dim.meshes).flat().forEach(m => scene.remove(m));
                }
            });

            currentDimension = savedDim;
            bindCurrentDimensionRefs();
        }

        // ============ GHOST & MONSTER TEXTURES ============
        function createGhostTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'white';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            ctx.arc(32, 32, 12, 0, Math.PI * 2);
            ctx.fill();
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        function giveStartItems() {

        // ============ INVENTORY SYSTEM ============
        function addToInventory(id, count=1) {
            // Önce mevcut stack'e ekle
            const allSlots = [...inventory.hotbar, ...inventory.main];
            for (let i = 0; i < allSlots.length; i++) {
                if (allSlots[i] && allSlots[i].id === id && allSlots[i].count < 64) {
                    const canAdd = Math.min(count, 64 - allSlots[i].count);
                    allSlots[i].count += canAdd;
                    count -= canAdd;
                    if (count === 0) { updateInventoryUI(); return true; }
                }
            }
            // Boş slot bul
            for (let i = 0; i < inventory.hotbar.length; i++) {
                if (!inventory.hotbar[i]) {
                    inventory.hotbar[i] = { id, count: Math.min(count, 64) };
                    count -= inventory.hotbar[i].count;
                    if (count === 0) { updateInventoryUI(); return true; }
                }
            }
            for (let i = 0; i < inventory.main.length; i++) {
                if (!inventory.main[i]) {
                    inventory.main[i] = { id, count: Math.min(count, 64) };
                    count -= inventory.main[i].count;
                    if (count === 0) { updateInventoryUI(); return true; }
                }
            }
            updateInventoryUI();
            return count === 0;
        }

        function removeFromActiveSlot(n=1) {
            const slot = inventory.hotbar[inventory.activeSlot];
            if (!slot) return false;
            slot.count -= n;
            if (slot.count <= 0) inventory.hotbar[inventory.activeSlot] = null;
            updateInventoryUI();
            return true;
        }

        function getActiveBlock() {
            const slot = inventory.hotbar[inventory.activeSlot];
            if (!slot) return 0;
            // Bloklar (1-99)
            if (slot.id < 100) return slot.id;
            // Item place (meşale vb)
            if (ITEMS[slot.id]?.place) return ITEMS[slot.id].placeBlock;
            return 0;
        }

        function buildInventoryUI() {
            // Hotbar
            const hotbarEl = document.getElementById('hotbar');
            hotbarEl.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const slot = document.createElement('div');
                slot.className = 'inv-slot' + (i === inventory.activeSlot ? ' selected' : '');
                slot.dataset.type = 'hotbar';
                slot.dataset.index = i;
                slot.addEventListener('click', () => {
                    inventory.activeSlot = i;
                    updateInventoryUI();
                    playSound('place', 0.3);
                });
                hotbarEl.appendChild(slot);
            }

            // Main inv
            const mainEl = document.getElementById('main-inventory');
            mainEl.innerHTML = '';
            for (let i = 0; i < 27; i++) {
                const slot = document.createElement('div');
                slot.className = 'inv-slot';
                slot.dataset.type = 'main';
                slot.dataset.index = i;
                attachSlotEvents(slot);
                mainEl.appendChild(slot);
            }

            // Hotbar inventory görünümü
            const hbInvEl = document.getElementById('hotbar-inventory');
            hbInvEl.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const slot = document.createElement('div');
                slot.className = 'inv-slot';
                slot.dataset.type = 'hotbar';
                slot.dataset.index = i;
                attachSlotEvents(slot);
                hbInvEl.appendChild(slot);
            }

            // Craft grid (3x3 = 9 slots)
            const craftEl = document.getElementById('craft-grid');
            craftEl.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const slot = document.createElement('div');
                slot.className = 'inv-slot';
